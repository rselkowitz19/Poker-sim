}

function getStraightAnalysis(){
  const count={flop:3,turn:4,river:5}[S.street]||0;
  if(!count)return'No board yet.';
  const cards=S.boardAll.slice(0,count);
  const RV={A:14,K:13,Q:12,J:11,T:10,'9':9,'8':8,'7':7,'6':6,'5':5,'4':4,'3':3,'2':2};
  const RN2={14:'A',13:'K',12:'Q',11:'J',10:'T',9:'9',8:'8',7:'7',6:'6',5:'5',4:'4',3:'3',2:'2'};
  const bRanks=new Set(cards.map(c=>RV[c.r]));

  const madeLines=[];
  const oesds=[], guts=[], seenFour=new Set();

  // Iterate every possible 5-card straight sequence
  for(let hi=14;hi>=5;hi--){
    // For wheel (A-low), use [5,4,3,2,14] but sort by treating A as 1
    const seq=(hi===5)?[5,4,3,2,14]:[hi,hi-1,hi-2,hi-3,hi-4];
    const isWheel=(hi===5);

    // Board cards present in this sequence
    const bInSeq=seq.filter(r=>bRanks.has(r));
    const hits=bInSeq.length;

    // Made straight: board contributes 3+ (only needs 2 hole cards)
    // Collect ALL made straights, not just the highest
    if(hits>=3){
      const onBoard=bInSeq.map(r=>RN2[r]).join('-');
      const needed=seq.filter(r=>!bRanks.has(r)).map(r=>RN2[r]).join('+');
      madeLines.push(`<b>Made straight: ${RN2[hi]}-high</b> (${seq.map(r=>RN2[r]).join('-')}). Board: ${onBoard}. Needs: ${needed||'nothing'}.`);
    }

    // Draws: board contributes exactly 2, player holds 2 of the 3 remaining
    if(hits===2){
      const missing=seq.filter(r=>!bRanks.has(r)); // 3 missing cards
      // Try every pair of hole cards from the missing 3
      for(let i=0;i<missing.length;i++){
        for(let j=i+1;j<missing.length;j++){
          const h1=missing[i], h2=missing[j];
          const rawFour=[...bInSeq,h1,h2];

          // Sort numerically, treating ace as 1 in wheel context
          const sort4=rawFour.map(r=>(isWheel&&r===14)?1:r).sort((a,b)=>a-b);
          const fourKey=sort4.join('-');
          if(seenFour.has(fourKey))continue;
          seenFour.add(fourKey);

          // Check if 4 cards are consecutive
          const consec=sort4.every((v,idx)=>idx===0||v-sort4[idx-1]===1);

          // Display versions (convert 1 back to A for wheel)
          const dispFour=sort4.map(r=>r===1?'A':RN2[r]).join('-');
          const holesSorted=[h1,h2].sort((a,b)=>{
            const a2=(isWheel&&a===14)?1:a;
            const b2=(isWheel&&b===14)?1:b;
            return a2-b2;
          });
          const holeStr=holesSorted.map(r=>(isWheel&&r===14)?'A':RN2[r]).join('-');

          if(consec){
            // OESD — find the two completing cards (one at each open end)
            const lo4=sort4[0], hi4=sort4[3];
            const compLowVal=(lo4>1)?(lo4===2?14:lo4-1):null;
            const compHighVal=(hi4<14)?hi4+1:null;
            // If a completer is already on the board, these hole cards make a MADE straight — not a draw
            if((compLowVal&&bRanks.has(compLowVal))||(compHighVal&&bRanks.has(compHighVal))){
              // Skip — this is a made straight (already captured in madeLines via hits>=3)
            } else {
            const compLow=(compLowVal===14)?'A':(compLowVal?RN2[compLowVal]:null);
            const compHigh=compHighVal?RN2[compHighVal]:null;
            const completers=[compLow,compHigh].filter(Boolean).join(' or ');
            oesds.push(`holding <b>${holeStr}</b> \u2192 ${dispFour} \u2014 needs ${completers}`);
            } // end else (not a made straight)
          } else {
            // Gutshot — find the interior gap card
            let gapCard=null;
            for(let k=1;k<sort4.length;k++){
              if(sort4[k]-sort4[k-1]>1){
                const g=sort4[k-1]+1;
                gapCard=(g===1)?'A':RN2[g];
                break;
              }
            }
            if(gapCard) guts.push(`holding <b>${holeStr}</b> \u2192 ${dispFour} \u2014 needs ${gapCard}`);
          }
        }
      }
    }
  }

  const parts=[];
  if(madeLines.length>0) madeLines.forEach(l=>parts.push(l));
  else parts.push('No made straight \u2014 board does not have 3 connected cards in any 5-card sequence.');

  if(oesds.length>0){
    parts.push(`<b>OESD draws (8 outs):</b><br>&nbsp;&nbsp;${oesds.slice(0,4).join('<br>&nbsp;&nbsp;')}`);
  }
  if(guts.length>0){
    parts.push(`<b>Gutshot draws (4 outs):</b><br>&nbsp;&nbsp;${guts.slice(0,4).join('<br>&nbsp;&nbsp;')}`);
  }
  if(!madeLines.length&&!oesds.length&&!guts.length){
    parts.push('No straight draws possible either \u2014 board cards are too spread apart. Safe board.');
  }
  return parts.join('<br>');
}

function getFlushDesc(){
  const count={flop:3,turn:4,river:5}[S.street]||0;
  if(!count)return'Preflop \u2014 no board.';
  const cards=S.boardAll.slice(0,count);
  const sc={};cards.forEach(c=>sc[c.s]=(sc[c.s]||0)+1);
  const SN={s:'spades \u2660',h:'hearts \u2665',d:'diamonds \u2666',c:'clubs \u2663'};
  const hits=Object.entries(sc).filter(([s,n])=>n>=2).sort((a,b)=>b[1]-a[1]);
  if(!hits.length)return'Rainbow board \u2014 no flush possible. No flush draws either.';
  const maxN=hits[0][1];
  const suit=hits[0][0];
  if(maxN>=3)return`<b>FLUSH POSSIBLE</b> \u2014 Three ${SN[suit]} on board. Any two ${SN[suit]} in villain\u2019s hand = flush made. Two-pair and straights lose value here.`;
  return`Flush draw: two ${SN[suit]} on board. One more ${SN[suit]} completes it (9 outs for villain holding two ${SN[suit]}). Do you block the draw with a ${SN[suit]} in your hand?`;
}

function getBoardTextureSummary(){
  const tags=getBoardTags();
  const isVeryWet=tags.some(t=>t.cls==='danger'&&t.t.includes('WET'));
  const isSemiWet=!isVeryWet&&tags.some(t=>t.cls==='warn');
  if(isVeryWet)return`<b>WET</b> \u2014 Connected AND suited. Draws everywhere. Size up: \u2154\u2013full pot minimum. Do not bet small here.`;
  if(isSemiWet)return`<b>SEMI-WET</b> \u2014 Some draw potential (flush or straight, not both). Size up to \u00bd\u2013\u2154 pot. Draws need charging.`;
  return`<b>DRY</b> \u2014 Few draws possible. Smaller bets work (\u2153\u2013\u00bd pot). Villain\u2019s range is mostly made hands or total air.`;
}

function getActionModeDesc(){
  const eff=Math.min(Math.round(S.heroStack/S.bbSize),Math.round(S.villStack/S.bbSize));
  if(eff<=15)return`\u226415BB effective: <b>Shove or fold ONLY.</b> No open-raises. Any playable hand = shove. Push-fold chart applies.`;
  if(eff<=25)return`15\u201325BB effective: <b>Push-fold range.</b> Open/3-bet shove with premium hands. Fold equity matters. Calling off your stack = dangerous.`;
  return`25BB+ effective: <b>Full game.</b> Open-raises, c-bets, implied odds, and full postflop decisions all in play.`;
}

function getShortStackDesc(){
  const hBBs=Math.round(S.heroStack/S.bbSize);
  const vBBs=Math.round(S.villStack/S.bbSize);
  const parts=[];
  if(hBBs<=20)parts.push(`Hero at ${hBBs}BB \u2014 you are short. Shove-or-fold logic applies to you.`);
  if(vBBs<=20)parts.push(`Villain at ${vBBs}BB \u2014 they are short. Expect wide shoves. Do NOT call off with marginal hands.`);
  if(vBBs<=25&&vBBs>20)parts.push(`Villain at ${vBBs}BB \u2014 push-fold range applies. Adjust isolation sizing.`);
  if(!parts.length)return`Both players are 25BB+. No short-stack adjustments needed.`;
  return parts.join(' ');
}

function getBoardTopCard(){
  const count={flop:3,turn:4,river:5}[S.street]||0;
  if(!count)return 0;
  const RV={A:14,K:13,Q:12,J:11,T:10,'9':9,'8':8,'7':7,'6':6,'5':5,'4':4,'3':3,'2':2};
  return Math.max(...S.boardAll.slice(0,count).map(c=>RV[c.r]));
}

function getRangeHitDesc(){
  const heroIsRaiser=(S.heroPos!=='BB');
  const raiserPos=heroIsRaiser?S.heroPos:S.villPos;
  const raiserName=heroIsRaiser?'You':'Villain';
  const raiserPossessive=heroIsRaiser?'Your':'Villain\u2019s';
  const villPos=heroIsRaiser?S.villPos:'BB';
  const defenderName=heroIsRaiser?`Villain (${villPos})`:'You (BB)';
  const villIsBB=(villPos==='BB');
  const top=getBoardTopCard();
  const RN2={14:'A',13:'K',12:'Q',11:'J',10:'T',9:'9',8:'8',7:'7',6:'6',5:'5',4:'4',3:'3',2:'2'};

  if(top<=9){
    if(villIsBB){
      return`${raiserName} raised from ${raiserPos}. ${raiserPossessive} range is wide \u2014 but <b>much of it misses this low board.</b> Broadway hands (AK, AQ, KQ, KJ, QJ, JT) are all overcards to a ${RN2[top]}-high board. ${defenderName}\u2019s range defends with all low pairs, low suited connectors (45s, 56s, 34s), and Ax hands \u2014 many of which connect directly. The key question: how many combos in ${raiserPossessive.toLowerCase()} range actually made a pair or better here?`;
    } else {
      return`${raiserName} raised from ${raiserPos}. ${raiserPossessive} range is wide \u2014 but <b>much of it misses this low board.</b> Broadway hands (AK, AQ, KQ, KJ, QJ, JT) are all overcards to a ${RN2[top]}-high board. ${defenderName}\u2019s <b>calling range is condensed</b> \u2014 pairs (22\u2013JJ), suited connectors (76s\u2013T9s), and broadway suited hands (ATs+, KJs+). ${defenderName} does NOT hold the low-connector junk a BB would defend with. The key question: how many combos in ${raiserPossessive.toLowerCase()} range actually made a pair or better versus a caller who has their own pair equity?`;
    }
  }
  if(top<=12){
    if(villIsBB){
      return`${raiserName} raised from ${raiserPos}. A ${RN2[top]}-high board is middle territory \u2014 both ranges connect. ${raiserPossessive} range has broadway pairs (AT, JT, QJ etc.), while ${defenderName} connects with suited connectors and mid-pairs. Ask: who has more of the top-pair combinations on this specific board?`;
    } else {
      return`${raiserName} raised from ${raiserPos}. A ${RN2[top]}-high board is middle territory \u2014 both ranges connect. ${raiserPossessive} range has broadway pairs (AJ, KT, QJ etc.), and ${defenderName}\u2019s condensed calling range (pairs, broadways, suited connectors) also connects here. This is a contested board \u2014 ask who has more two-pair and set combos specifically.`;
    }
  }
  const highStr=top===14?'Ace':'King';
  return`${raiserName} raised from ${raiserPos}. A ${highStr}-high board hits ${raiserPossessive.toLowerCase()} range hard \u2014 ${raiserPos} opens many AK, AQ, KQ, KJ combos. ${defenderName} holds fewer Ax/Kx combinations relative to the raiser. Clear range advantage goes to the raiser here.`;
}

function getRangeAdvantageDesc(){
  const heroIsRaiser=(S.heroPos!=='BB');
  const villPos=heroIsRaiser?S.villPos:'BB';
  const villIsBB=(villPos==='BB');
  const top=getBoardTopCard();
  const RN2={14:'A',13:'K',12:'Q',11:'J',10:'T',9:'9',8:'8',7:'7',6:'6',5:'5',4:'4',3:'3',2:'2'};
  const topStr=RN2[top]||'?';

  // CRITICAL: the preflop raiser does NOT automatically have range advantage postflop.
  // Low boards (top card ≤ 9) heavily favor the BB defender whose range includes
  // all low pairs and connectors. The raiser's wide range is full of overcards that whiffed.
  // Against a BTN/CO CALLER (not BB), the dynamic is different — their range is condensed
  // around pairs and suited connectors, so the low-board edge is less pronounced.
  if(!heroIsRaiser&&top<=9){
    return`<b>You (BB) have range advantage on this low board.</b> Villain\u2019s wide opening range is loaded with broadway overcards (AK, AQ, KQ, JT, etc.) that completely miss a ${topStr}-high board. Your BB defending range includes all low pairs \u2014 some of which flopped sets or two pair \u2014 plus low suited connectors and Ax hands that connect far more. This is one of the few spots where BB can confidently lead or check-raise. Note: for exact equity percentages, load both ranges into Flopzilla.`;
  }
  if(heroIsRaiser&&top<=9){
    if(villIsBB){
      return`<b>Villain (BB defender) may have range advantage on this low board.</b> Your opening range from ${S.heroPos} includes many broadway overcards that missed a ${topStr}-high board. Villain\u2019s BB range connects more often with low pairs and suited connectors. Do not auto-bet. Check whether you have a real equity advantage before building the pot. Verify in Flopzilla.`;
    } else {
      return`<b>This is a contested low board \u2014 neither player has a clear range advantage.</b> Your range from ${S.heroPos} has many broadway overcards that miss a ${topStr}-high board. However, Villain (${villPos}) is NOT a BB defender \u2014 their condensed calling range (pairs, suited connectors 76s\u2013T9s, broadway suiteds) doesn\u2019t hold the low-connector junk that gives BB range advantage here. Both ranges have some miss rate. Do not auto-bet \u2014 assess your specific equity before building the pot. Verify in Flopzilla.`;
    }
  }
  if(heroIsRaiser){
    return`<b>You have range advantage</b> as the preflop raiser on this ${top>=13?'K/A':'mid'}-high board. Your opening range has more Ax, Kx, and broadway hands that connect here. Bet with a plan.`;
  }
  return`<b>Villain has range advantage</b> as the preflop raiser on this ${top>=13?'K/A':'mid'}-high board. Their range has more Ax, Kx, and broadway combinations that connect. Tread carefully \u2014 you need real equity or a specific read before betting or bluffing. Verify in Flopzilla.`;
}

function getDrawDesc(){
  const count={flop:3,turn:4,river:5}[S.street]||0;
  if(!count)return'Preflop.';
  const board=S.boardAll.slice(0,count);
  const RV={A:14,K:13,Q:12,J:11,T:10,'9':9,'8':8,'7':7,'6':6,'5':5,'4':4,'3':3,'2':2};
  const RN2={14:'A',13:'K',12:'Q',11:'J',10:'T',9:'9',8:'8',7:'7',6:'6',5:'5',4:'4',3:'3',2:'2'};
  const allCards=[...S.heroCards,...board];
  const allRanks=allCards.map(c=>RV[c.r]);
  const uRanks=[...new Set(allRanks)].sort((a,b)=>b-a);
  const draws=[];

  // Straight draws
  for(let hi=14;hi>=5;hi--){
    const s=(hi===5)?[5,4,3,2,14]:[hi,hi-1,hi-2,hi-3,hi-4];
    const have=s.filter(r=>uRanks.includes(r));
    if(have.length===4){
      have.sort((a,b)=>b-a);
      const consecutive=have.every((v,i)=>i===0||have[i-1]-v===1);
      const desc=s.map(r=>RN2[r]).join('-');
      if(consecutive){
        draws.push(`<b>OESD (8 outs)</b>: ${desc} \u2014 open-ended, two cards complete it`);
      } else {
        const missing=s.find(r=>!uRanks.includes(r));
        draws.push(`<b>Gutshot (4 outs)</b>: ${desc} \u2014 missing ${RN2[missing]} in the middle`);
      }
    }
  }

  // Flush draw check — distinguish real draw, backdoor draw, dominated draw, and board threat
  const SN={s:'spades \u2660',h:'hearts \u2665',d:'diamonds \u2666',c:'clubs \u2663'};
  const holeSuits={}, boardSuits={};
  S.heroCards.forEach(c=>holeSuits[c.s]=(holeSuits[c.s]||0)+1);
  board.forEach(c=>boardSuits[c.s]=(boardSuits[c.s]||0)+1);

  const allSuits=new Set([...Object.keys(holeSuits),...Object.keys(boardSuits)]);
  allSuits.forEach(suit=>{
    const hc=holeSuits[suit]||0;
    const bc=boardSuits[suit]||0;
    const total=hc+bc;
    const sn=SN[suit];

    if(total===5&&hc===2){
      // Already made a flush
      draws.push(`<b>Flush made</b>: you hold two ${sn}, board has three. You have a flush already.`);

    } else if(total===4&&hc===2){
      // Standard flush draw: 2 hole + 2 board. Clean 9 outs.
      draws.push(`<b>Flush draw (9 outs)</b>: you hold two ${sn}, board has two more. Any ${sn} on the next street completes your flush.`);

    } else if(total===4&&hc===1&&bc===3){
      // Dominated flush draw: board has 3 of suit, hero holds 1
      const heroCard=S.heroCards.find(c=>c.s===suit);
      const heroRank=heroCard?RN2[RV[heroCard.r]]:'?';
      draws.push(`<b>\u26a0 Dominated flush situation:</b> Board has THREE ${sn}. You hold one (${heroRank}${sn.slice(-1)}), making a ${heroRank}-high flush draw \u2014 but this is <b>not 9 clean outs</b>. Villain holding any single ${sn.split(' ')[0]} has a better flush draw. Villain holding <b>two ${sn.split(' ')[0]}</b> already has a <b>made flush right now</b>.`);

    } else if(total===3&&hc===2&&bc===1){
      // BACKDOOR flush draw: 2 hole + 1 board. Needs matching suit on BOTH turn AND river.
      // Equity: ~10% chance on turn × ~20% on river ≈ 4% total. Worth ~1-2 equivalent outs only.
      draws.push(`<b>Backdoor flush draw (~1\u20132 equivalent outs)</b>: you hold two ${sn}, board has one. You need ${sn.split(' ')[0]} on <b>both</b> the turn AND river to make a flush \u2014 approximately 4% chance. This is <b>not 9 outs</b>. Do not treat this as a real draw. It adds marginal equity on top of your primary draw(s) but should never be the reason to call a bet.`);

    } else if(total===3&&hc===1&&bc===2){
      // Weak backdoor: 1 hole + 2 board. Needs matching suit on both remaining streets.
      // Even weaker than 2-hole backdoor since hero contributes only 1 card.
      draws.push(`<b>Weak backdoor flush possibility (~1 equivalent out)</b>: you hold one ${sn.split(' ')[0]}, board has two. Needs ${sn.split(' ')[0]} on both turn AND river. Roughly 4% but split across villain\u2019s range holding the same suit. Negligible \u2014 note it but do not factor it into your call math.`);

    } else if(bc===3&&hc===0){
      // Board has 3 of a suit, hero holds none — villain threat only
      draws.push(`<b>\u26a0 Flush threat on board:</b> Board has THREE ${sn} and you hold none. Any villain with two ${sn.split(' ')[0]} already has a made flush. Factor this into Q2.`);
    }
  });

  if(!draws.length)return'No straight or flush draws with your hole cards + board. Your equity is your made hand only.';
  return draws.join('<br>');
}

function getHandsThatHeroBeats(){
  const count={flop:3,turn:4,river:5}[S.street]||0;
  if(!count)return'No board yet.';
  const board=S.boardAll.slice(0,count);
  const heroResult=evalHand(S.heroCards,board);
  const SYM2={s:'\u2660',h:'\u2665',d:'\u2666',c:'\u2663'};

  // Build dead card set — hero's cards + board
  const dead=new Set([...S.heroCards,...board].map(c=>c.r+c.s));
  const rem=[];
  for(const r of RANKS)for(const s of SUITS)if(!dead.has(r+s))rem.push({r,s});

  // Enumerate all 2-card combos — filtered to realistic villain range only
  const losing=[], tying=[];
  let totalCombos=0;
  for(let i=0;i<rem.length;i++){
    for(let j=i+1;j<rem.length;j++){
      const vc=[rem[i],rem[j]];
      if(!isVillainHandPlayable(vc)) continue;
      totalCombos++;
      const vh=evalHand(vc,board);
      const cmp=compareHands(heroResult,vh);
      if(cmp>0) losing.push({cards:vc,hand:vh});
      else if(cmp===0) tying.push({cards:vc,hand:vh});
    }
  }

  if(!losing.length&&!tying.length){
    return`Your hand (<b>${heroResult.desc}</b>) does not beat any possible villain holding on this board. You are behind everything. Do not invest further without a strong draw.`;
  }

  // Group losing (villain losing to hero) by hand description
  const groups={};
  for(const {cards,hand} of losing){
    const key=hand.desc;
    if(!groups[key])groups[key]={desc:hand.desc,rank:hand.rank,combos:[]};
    groups[key].combos.push(cards);
  }

  // Sort by hand rank descending — show strongest hands hero beats first
  const sorted=Object.values(groups).sort((a,b)=>b.rank-a.rank||b.combos.length-a.combos.length);

  const lines=[];
  lines.push(`Your hand: <b>${heroResult.desc}</b>`);
  lines.push(`Hands you beat \u2014 ${losing.length} combos${tying.length?`, ${tying.length} tie`:''} out of ${totalCombos} total:`);
  lines.push('');

  for(const g of sorted.slice(0,8)){
    const n=g.combos.length;
    const examples=g.combos.slice(0,4).map(cards=>
      '<b>'+cards.map(c=>c.r+SYM2[c.s]).join('-')+'</b>'
    ).join(', ');
    const more=n>4?` <span style="color:var(--text3)">(+${n-4} more)</span>`:'';
    lines.push(`\u25b6 <b>${g.desc}</b> [${n} combo${n>1?'s':''}]: ${examples}${more}`);
  }

  if(sorted.length>8){
    const rem2=sorted.slice(8).reduce((s,g)=>s+g.combos.length,0);
    lines.push(`<span style="color:var(--text3)">\u2026and ${rem2} more combos across ${sorted.length-8} other categories</span>`);
  }

  // Summary percentage and confidence read
  lines.push('');
  const pct=Math.round(losing.length/totalCombos*100);
  if(pct>=60) lines.push(`<b style="color:var(--green)">${pct}% of possible villain holdings lose to you.</b> You are ahead of most of the deck. Bet for value.`);
  else if(pct>=35) lines.push(`<b style="color:var(--amber)">${pct}% of possible villain holdings lose to you.</b> You beat a meaningful portion of the range but remain vulnerable. Size carefully and reassess each street.`);
  else lines.push(`<b style="color:var(--red)">${pct}% of possible villain holdings lose to you.</b> Short list \u2014 your hand is marginal. Proceed with caution. Check is likely correct unless you have a strong draw.`);

  return lines.join('<br>');
}

function getHandsThatBeatHero(){
  const count={flop:3,turn:4,river:5}[S.street]||0;
  if(!count)return'No board yet.';
  const board=S.boardAll.slice(0,count);
  const heroResult=evalHand(S.heroCards,board);
  const SYM2={s:'\u2660',h:'\u2665',d:'\u2666',c:'\u2663'};

  // Build dead card set — hero's cards + board
  const dead=new Set([...S.heroCards,...board].map(c=>c.r+c.s));

  // Remaining deck
  const rem=[];
  for(const r of RANKS)for(const s of SUITS)if(!dead.has(r+s))rem.push({r,s});

  // Enumerate all 2-card combos — filtered to realistic villain range only
  const beating=[];
  for(let i=0;i<rem.length;i++){
    for(let j=i+1;j<rem.length;j++){
      const vc=[rem[i],rem[j]];
      if(!isVillainHandPlayable(vc)) continue;
      const vh=evalHand(vc,board);
      if(compareHands(vh,heroResult)>0) beating.push({cards:vc,hand:vh});
    }
  }

  if(!beating.length){
    return`Your hand (<b>${heroResult.desc}</b>) cannot be beaten by any 2-card combination on this board. You are at or near the nuts. The only risk is a board that improves on later streets.`;
  }

  // Group by hand description
  const groups={};
  for(const {cards,hand} of beating){
    const key=hand.desc;
    if(!groups[key])groups[key]={desc:hand.desc,rank:hand.rank,combos:[]};
    groups[key].combos.push(cards);
  }

  // Sort by hand rank descending, then by combo count
  const sorted=Object.values(groups).sort((a,b)=>b.rank-a.rank||b.combos.length-a.combos.length);

  // Action context flags
  const pfThreeBet=S.actionLog.some(e=>/^villain.*(3-bet|raises)/i.test(e)&&/preflop/i.test(e));
  const pfCalled=S.actionLog.some(e=>/^villain.*calls/i.test(e)&&!/(flop|turn|river)/i.test(e));
  const flopCR=S.actionLog.some(e=>/^villain.*raises/i.test(e)&&/flop/i.test(e));
  const turnCR=S.actionLog.some(e=>/^villain.*raises/i.test(e)&&/turn/i.test(e));
  const flopBet=S.actionLog.some(e=>/^villain.*bets/i.test(e)&&/flop/i.test(e));

  const lines=[];
  lines.push(`Your hand: <b>${heroResult.desc}</b>`);
  lines.push(`Hands that beat you on this board \u2014 ${beating.length} combos total:`);
  lines.push('');

  // Show each group — cap at 7 categories max
  for(const g of sorted.slice(0,7)){
    const n=g.combos.length;
    // Show up to 4 example hole-card combos
    const examples=g.combos.slice(0,4).map(cards=>
      '<b>'+cards.map(c=>c.r+SYM2[c.s]).join('-')+'</b>'
    ).join(', ');
    const more=n>4?` <span style="color:var(--text3)">(+${n-4} more)</span>`:'';
    lines.push(`\u25b6 <b>${g.desc}</b> [${n} combo${n>1?'s':''}]: ${examples}${more}`);
  }

  if(sorted.length>7){
    const remaining2=sorted.slice(7).reduce((s,g)=>s+g.combos.length,0);
    lines.push(`<span style="color:var(--text3)">\u2026and ${remaining2} more combos across ${sorted.length-7} other hand categories</span>`);
  }

  // Action consistency analysis
  lines.push('');
  lines.push('<b>Which of these fit villain\u2019s action?</b>');

  const actionNotes=[];
  if(pfThreeBet){
    actionNotes.push('Villain 3-bet preflop \u2192 range is heavily weighted toward premiums: AA, KK, QQ, JJ, AK. Sets of those pairs are very live. Weak two-pair combos are unlikely.');
  } else if(pfCalled){
    actionNotes.push('Villain called preflop \u2192 medium-wide range. Sets of mid-pairs (22\u2013TT) and two pair are very live. Premiums (AA, KK) are less likely \u2014 most players 3-bet those.');
  }
  if(flopCR){
    actionNotes.push('\u26a0 Villain check-raised the flop \u2192 recreational heuristic: strength 80%+ of the time. Sets and top two pair are the primary suspects. Thin value raises (one pair) are rare from recreational players.');
  } else if(flopBet){
    actionNotes.push('Villain led the flop \u2192 strong made hands and top-pair combos are plausible. Draws leading for protection are also possible on wet boards.');
  }
  if(turnCR){
    actionNotes.push('\u26a0 Villain check-raised the turn \u2192 this is a very strong line. Completed draws (straights, flushes) and sets are most likely. Bluffs are rare from recreational players on the turn.');
  }
  if(!actionNotes.length){
    actionNotes.push('Walk villain\u2019s bet sizing on each street. Does it match a hand that wants to build the pot, protect equity, or get a call on the river? Consistent sizing = polarised range (strong or bluff). Inconsistent sizing = often medium-strength hand.');
  }
  actionNotes.forEach(n=>lines.push(n));

  // Summary guidance
  lines.push('');
  const pct=Math.round(beating.length/(rem.length*(rem.length-1)/2)*100);
  if(pct>=40) lines.push(`<b style="color:var(--red)">${pct}% of possible villain holdings beat you.</b> This is a large portion of the deck. Proceed with significant caution.`);
  else if(pct>=20) lines.push(`<b style="color:var(--amber)">${pct}% of possible villain holdings beat you.</b> Moderate danger. Weight your decision by how well villain\u2019s action fits the hands in this list.`);
  else lines.push(`<b style="color:var(--green)">${pct}% of possible villain holdings beat you.</b> You are ahead of most of the deck. The question is whether villain specifically holds one of the combos above.`);

  return lines.join('<br>');
}

function getVillainStory(){
  const RN2={14:'A',13:'K',12:'Q',11:'J',10:'T',9:'9',8:'8',7:'7',6:'6',5:'5',4:'4',3:'3',2:'2'};
  const RV={A:14,K:13,Q:12,J:11,T:10,'9':9,'8':8,'7':7,'6':6,'5':5,'4':4,'3':3,'2':2};
  const SYM2={s:'\u2660',h:'\u2665',d:'\u2666',c:'\u2663'};
  const streets=['preflop','flop','turn','river'];

  // Strip HTML from preflopNarrative for clean text
  const pfText=S.preflopNarrative.replace(/<[^>]+>/g,'').replace(/\s+/g,' ').trim();

  // Bucket actionLog entries by street
  const byStreet={preflop:[],flop:[],turn:[],river:[]};
  for(const entry of S.actionLog){
    let street='preflop';
    if(/\(flop\)/i.test(entry)) street='flop';
    else if(/\(turn\)/i.test(entry)) street='turn';
    else if(/\(river\)/i.test(entry)) street='river';
    else if(/preflop/i.test(entry)) street='preflop';
    // postflop entries without street label default to whatever street hero/villain were on
    const clean=entry.replace(/\s*\((preflop|flop|turn|river)\)/i,'').trim();
    byStreet[street].push(clean);
  }

  // Extract only villain actions per street
  function villainActions(street){
    return byStreet[street].filter(e=>/^villain/i.test(e));
  }

  // Build board string for each street
  const count={preflop:0,flop:3,turn:4,river:5};
  function boardAt(street){
    const n=count[street]||0;
    if(!n)return'';
    return S.boardAll.slice(0,n).map(c=>c.r+SYM2[c.s]).join(' ');
  }

  // Identify villain's cards (if revealed or at showdown)
  const vHand=S.villCards.map(c=>c.r+SYM2[c.s]).join(' ');
  const vRevealed=S.villRevealed;

  const lines=[];

  // ── Preflop ──
  lines.push('<b>PREFLOP</b>');
  lines.push(`Setup: ${pfText}`);
  const vPF=villainActions('preflop');
  if(vPF.length) lines.push(`Villain: ${vPF.join(' \u2192 ')}`);
  else lines.push('Villain: (no action recorded yet)');

  // ── Postflop streets — only show streets that have been reached ──
  // A street is shown if: it has recorded actions, OR it is the current street.
  // This is more reliable than S.street alone (which can advance during all-in runouts).
  const streetOrder={preflop:0,flop:1,turn:2,river:3};
  const currentStreetIdx=streetOrder[S.street]||0;
  for(const st of ['flop','turn','river']){
    const hasAction=byStreet[st].length>0;
    const isCurrent=S.street===st;
    // Never show a street beyond current, even if somehow S.street is wrong
    if(streetOrder[st]>currentStreetIdx&&!hasAction) break;
    if(!hasAction&&!isCurrent) break; // no action and not active — future street
    const board=boardAt(st);
    if(!board) break;
    const va=villainActions(st);
    const ha=byStreet[st].filter(e=>/^hero/i.test(e));
    lines.push('');
    lines.push(`<b>${st.toUpperCase()}</b> \u2014 Board: ${board}`);
    if(ha.length||va.length){
      // Interleave in order as they appear in actionLog
      const allThisStreet=byStreet[st];
      const sequence=allThisStreet.map(e=>{
        const isV=/^villain/i.test(e);
        return`${isV?'<b style="color:var(--red)">Villain</b>':'<b style="color:var(--green)">Hero</b>'}: ${e.replace(/^(villain|hero):?\s*/i,'')}`;
      });
      sequence.forEach(s=>lines.push(s));
    } else {
      lines.push('(no action recorded for this street yet)');
    }
  }

  // ── Story analysis ──
  lines.push('');
  lines.push('<b>Does the story hold together?</b>');

  // Auto-detect patterns worth flagging
  const flags=[];

  // Preflop call then big bet on flop = could be slowplayed monster OR complete air
  const pfCalled=villainActions('preflop').some(e=>/calls/i.test(e));
  const pfThreeBet=villainActions('preflop').some(e=>/3-bet|raises/i.test(e));
  const flopBet=villainActions('flop').some(e=>/bets/i.test(e));
  const flopRaise=villainActions('flop').some(e=>/raises/i.test(e));
  const flopCheck=villainActions('flop').some(e=>/checks/i.test(e));
  const turnBet=villainActions('turn').some(e=>/bets/i.test(e));

  if(pfThreeBet&&flopBet) flags.push('Villain 3-bet preflop and led the flop \u2014 range is strong (premiums, AK). Proceed with caution.');
  if(pfCalled&&flopCheck&&turnBet) flags.push('Villain called preflop, checked the flop, then led the turn \u2014 possible slowplay on the flop or the turn card improved their hand significantly. Ask: what does the turn card change?');
  if(pfCalled&&flopRaise) flags.push('Villain called preflop then check-raised the flop \u2014 recreational villain heuristic applies. This indicates strength 80%+ of the time: sets, two pair, or a strong draw on a wet board.');
  if(pfCalled&&flopBet) flags.push('Villain called preflop and led the flop (donk bet) \u2014 unusual line. Could indicate a draw, a weak pair testing the water, or a real hand. Does the board hit their calling range?');
  if(!flags.length) flags.push('No obvious pattern flags on this sequence. Walk each action manually: does the bet sizing on each street tell a consistent story for one specific hand type?');

  flags.forEach(f=>lines.push('\u26a0 '+f));

  // Reveal villain cards if known
  if(vRevealed){
    lines.push('');
    lines.push(`<b>Villain held: ${vHand}</b>`);
    lines.push('Now that you know their hand \u2014 does their line make sense? Was their bet sizing appropriate for what they had? File this as a pattern to recognize next time.');
  } else {
    lines.push('');
    lines.push('Villain cards not yet revealed. Make your read first \u2014 then reveal to check.');
  }

  return lines.join('<br>');
}

function getBetSizingGuide(){
  const tags=getBoardTags();
  const isVeryWet=tags.some(t=>t.cls==='danger'&&(t.t.includes('WET')||t.t.includes('connected')));
  const hasFlush=tags.some(t=>t.t.includes('Flush')||t.t.includes('flush'));
  const isWet=isVeryWet||hasFlush;
  const isSemiWet=!isWet&&tags.some(t=>t.cls==='warn');
  let bStr=isWet?'\u2154\u2013full pot (WET board)':isSemiWet?'\u00bd\u2013\u2154 pot (semi-wet)':'\u2153\u2013\u00bd pot (DRY board)';
  return`<b>Factor 1 \u2014 Board:</b> ${bStr}<br><b>Factor 2 \u2014 Hand:</b> Set/two-pair+ \u2192 \u2154\u2013full pot \u00b7 Top pair weak kicker \u2192 \u2153\u2013\u00bd pot \u00b7 Bluff \u2192 match your value sizing<br><b>Factor 3 \u2014 Player:</b> ClubWPT calling station \u2192 SIZE UP every street. \u2153 pot is a leak, not caution.`;
}

function getPotOddsModelAnswer(){
  const pot=S.pot, vbet=S.villBet;
  const threshold=Math.round(vbet/(pot+vbet)*100);
  const mult=S.street==='flop'?4:2;
  return`You need <b>${threshold}%</b> equity. Rule of ${mult===4?'4':'2'} (${S.street}): outs \u00d7 ${mult} = equity %.<br>Flush draw (9 outs) = ${9*mult}% \u00b7 OESD (8 outs) = ${8*mult}% \u00b7 Gutshot (4 outs) = ${4*mult}% \u00b7 Two overcards (6 outs) = ${6*mult}%.<br>My equity \u2265 ${threshold}%? <b>YES \u2192 call justified</b> \u00b7 <b>NO \u2192 need implied odds or fold.</b>`;
}

function getChecklistDef(){
  const hBBs=Math.round(S.heroStack/S.bbSize);
  const vBBs=Math.round(S.villStack/S.bbSize);
  const eff=Math.min(hBBs,vBBs);
  const phases=[];

  // Phase 1 — always shown; Q&A items only on preflop (no need to re-ask postflop)
  const ph1Items=[
    {id:'p1i1',type:'check',
     label:`Stack depth: Hero <b>${hBBs}BB</b> \u00b7 Villain <b>${vBBs}BB</b> \u00b7 Effective <b>${eff}BB</b> \u2192 <b>${eff<=15?'Shove/fold only':eff<=25?'Push-fold range':'Full game'}</b>`,
     note:'\u226415BB \u2192 shove or fold ONLY \u00b7 15\u201325BB \u2192 push-fold range \u00b7 25BB+ \u2192 full game'},
    {id:'p1i2',type:'qa',
     label:'What villain type are you facing? Name them.',
     note:'Recreational (calling station) \u00b7 Unknown \u00b7 Regular. At ClubWPT: default to recreational.',
     modelAnswer:'At ClubWPT: assume <b>recreational (calling station)</b> until proven otherwise. They call too wide and rarely bluff. Large bets and check-raises indicate real strength 80%+ of the time.'}
  ];
  if(S.street==='preflop'){
    ph1Items.push(
      {id:'p1i3',type:'qa',
       label:'Who, if anyone, is short-stacked? What does that change?',
       note:'Short stacks shove wide. Do not call off with marginal hands. Adjust isolation sizing.',
       modelFnId:'getShortStackDesc'}
    );
  }
  phases.push({id:'ph1',name:'Phase 1 \u2014 Stack depth',items:ph1Items});

  if(S.street!=='preflop'){
    // Phase 2 — Board texture
    phases.push({id:'ph2',name:'Phase 2 \u2014 Board texture',items:[
      {id:'p2i1',type:'qa',
       label:'What are the straight possibilities? Name any made straights AND straight draws (OESD / gutshot).',
       note:'A made straight needs 3 board cards in sequence (needs 2 hole cards). A draw needs only 2 board cards \u2014 any pair within 3 ranks can create an OESD; 4 ranks apart = gutshot. Check ALL board card pairs.',
       modelFnId:'getStraightAnalysis'},
      {id:'p2i2',type:'qa',
       label:'Is there a flush draw? Which suit? Do you block it?',
       note:'Two suited = flush draw (9 outs) \u00b7 Three suited = flush possible, two pair loses value. Do any of your hole cards block the draw?',
       modelFnId:'getFlushDesc'},
      {id:'p2i3',type:'check',
       label:'Paired board check \u2014 does any rank appear twice?',
       note:'Paired boards: sets are very strong, flushes lose value, top two-pair drops vs trips. Slow down if you only have a flush or straight.'},
      {id:'p2i4',type:'qa',
       label:'Name this board texture in one word \u2014 DRY, SEMI-WET, or WET. Justify it.',
       note:'Dry = rainbow, disconnected \u2192 \u2153 pot OK \u00b7 Semi-wet = one threat \u2192 \u00bd\u2013\u2154 pot \u00b7 Wet = connected + suited \u2192 \u2154+ pot, charge draws now.',
       modelFnId:'getBoardTextureSummary'}
    ]});

    // Phase 3 — Range advantage
    phases.push({id:'ph3',name:'Phase 3 \u2014 Range advantage',items:[
      {id:'p3i1',type:'qa',
       label:'Who raised preflop? How does their range connect with this board?',
       note:'UTG opener hits K-7-2 hard. BTN opener hits J-T-8 wide. The raiser should be betting \u2014 not auto-checking.',
       modelFnId:'getRangeHitDesc'},
      {id:'p3i2',type:'qa',
       label:'Who has range advantage here \u2014 you or villain? Why?',
       note:'Range advantage \u2192 bet with a plan. Villain advantage \u2192 need equity or a real reason before betting.',
       modelFnId:'getRangeAdvantageDesc'},
    ]});

    // Phase 4 — 4-question hand analysis
    phases.push({id:'ph4',name:'Phase 4 \u2014 4-question hand analysis',items:[
      {id:'p4i_pffilter',type:'check',
       label:'Preflop filter: No 3-bet \u2192 remove AA, KK, QQ, JJ, AKs/o, AQs/o, AJs/o from villain\u2019s range.',
       note:'If villain did not 3-bet preflop, eliminate these premium combos before ranging. Work only from what remains.'},
      {id:'p4i_sets',type:'check',
       label:'Did you think about sets and two pair in villain\u2019s range?',
       note:'These are the hands that will stack you. They call preflop then explode on the flop. Always account for them before continuing.'},
      {id:'p4i_tp',type:'check',
       label:'Did you remember: top pair is NOT a monster?',
       note:'Top pair is a good hand \u2014 not a monster. It is vulnerable to sets, two pair, and draws. Size accordingly and reassess every street.'},
      {id:'p4i1',type:'qa',
       label:'Q1 \u2014 What hands are you beating right now? List them.',
       note:'Specific hand categories: weaker pairs, draws, air. Short list = caution. Long list = confidence.',
       modelFnId:'getHandsThatHeroBeats'},
      {id:'p4i2',type:'qa',
       label:'Q2 \u2014 What hands beat you that play exactly this way?',
       note:'Walk the action on every street. Does the sizing and sequence tell a consistent story for a strong hand?',
       modelFnId:'getHandsThatBeatHero'},
      {id:'p4i_draws',type:'qa',
       label:'Do you have any draws? OESD, gutshot, flush draw, or backdoor? Count your outs.',
       note:'Gutshot recognition is a required step \u2014 not optional. KHL-002 was caused by invisible gutshot. Count outs even if you think you have none.',
       modelFnId:'getDrawDesc'},
      {id:'p4i3',type:'qa',
       label:'Q3 \u2014 Walk villain\u2019s story street by street. What did they do and does it make sense?',
       note:'Preflop action \u2192 flop action \u2192 turn action. Do the bet sizes and sequence tell one consistent story for a specific hand? Inconsistent = possible bluff or weakness.',
       modelFnId:'getVillainStory'},
      {id:'p4i_lbh',type:'check',
       label:'Large bet heuristic \u2014 is villain making an oversized bet or check-raise?',
       note:'If YES \u2192 strength 80%+. Slow down. This does NOT apply to standard 50\u201367% pot bets \u2014 only oversized bets and check-raises.'},
      {id:'p4i4',type:'qa',
       label:'Q4 \u2014 Name your goal with this action: VALUE / PROTECTION / FOLD EQUITY / BLUFF',
       note:'You must be able to name one goal. If you cannot \u2014 check is the default action.',
       modelAnswer:'<b>VALUE:</b> I want worse hands to call and will get called. <b>PROTECTION:</b> I want draws to fold and pay to continue. <b>FOLD EQUITY:</b> I want better hands to fold \u2014 villain is capped. <b>BLUFF:</b> I have little equity and want villain to fold right now. \u2014 If none of these is clearly true, check.'}
    ]});

    // Phase 5 — Bet sizing
    phases.push({id:'ph5',name:'Phase 5 \u2014 Bet sizing',items:[
      {id:'p5i1',type:'qa',
       label:'State your bet size and justify it using all three factors: board, hand, and player type.',
       note:'Board drives sizing most. Wet = charge draws. Calling station = size up. \u2153 pot against a calling station is a leak.',
       modelFnId:'getBetSizingGuide'}
    ]});
  }

  // Phase 6 — only postflop when villain bets
  if(S.villBet>0&&S.street!=='preflop'){
    const pot=S.pot; const vbet=S.villBet;
    const potOddsNeeded=Math.round(vbet/(pot+vbet)*100);
    const betPct=Math.round(vbet/pot*100);
    phases.push({id:'ph6',name:'Phase 6 \u2014 Pot odds & equity',items:[
      {id:'p6i1',type:'qa',
       label:`Villain bet ${fc(vbet)} (${betPct}% pot) \u2014 you need <b style="color:var(--amber)">${potOddsNeeded}% equity</b>. How many outs do you have? State your equity %.`,
       note:`Rule of 2&4: Flush (9 outs) = ${S.street==='flop'?36:18}% \u00b7 OESD (8 outs) = ${S.street==='flop'?32:16}% \u00b7 Gutshot (4 outs) = ${S.street==='flop'?16:8}% \u00b7 Two overcards (6 outs) = ${S.street==='flop'?24:12}%`,
       modelFnId:'getPotOddsModelAnswer'},
      {id:'p6i2',type:'check',
       label:`Call decision: my equity \u2265 ${potOddsNeeded}% \u2192 call justified \u00b7 equity < ${potOddsNeeded}% \u2192 need implied odds or fold`,
       note:'If close to the threshold, consider implied odds: how much will you win when you hit? Implied odds favor deep stacks and hidden draws.'}
    ]});
  }

  return phases;
}

function getBoardStr(){
  const count=S.street==='flop'?3:S.street==='turn'?4:S.street==='river'?5:0;
  return S.boardAll.slice(0,count).map(c=>c.r+SYM[c.s]).join(' ');
}

// ── Review panel ──
function openReview(){
  const phases=getChecklistDef();
  const board=getBoardStr();
  const eff=Math.min(Math.round(S.heroStack/S.bbSize),Math.round(S.villStack/S.bbSize));
  const boardTags=S.street!=='preflop'?getBoardTags():[];

  document.getElementById('reviewContext').innerHTML=
    `<b>${S.heroPos}</b> vs <b>${S.villPos}</b> &nbsp;|&nbsp; `+
    `Effective: <b>${eff}BB</b> &nbsp;|&nbsp; `+
    `Street: <b>${cap(S.street)}</b>`+
    (board?` &nbsp;|&nbsp; Board: <b>${board}</b>`:'');

  document.getElementById('reviewBody').innerHTML=phases.map(ph=>{
    const allDone=ph.items.every(it=>S.clState[it.id]);
    let extra='';
    if(ph.id==='ph2'&&boardTags.length>0){
      extra=`<div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;">${boardTags.map(t=>`<span class="btag ${t.cls}">${t.t}</span>`).join('')}</div>`;
    }
    return`<div class="rphase">
      <div class="rphase-name">
        ${ph.name}
        <span class="${allDone?'rphase-done-tag':'rphase-pending-tag'}">${allDone?'done':'pending'}</span>
      </div>
      ${extra}
      ${ph.items.map(it=>{
        const done=!!S.clState[it.id];
        return`<div style="margin-bottom:10px;padding-left:10px;border-left:2px solid ${done?'var(--green-dim)':'var(--border2)'};">
          <div class="rphase-text" style="color:${done?'var(--text2)':'var(--text)'};">${done?'<span style="color:var(--green)">✓</span> ':''}${it.label}</div>
          <div style="font-size:13px;color:var(--text3);margin-top:3px;line-height:1.5;">${it.note}</div>
        </div>`;
      }).join('')}
    </div>`;
  }).join('');

  document.getElementById('reviewOverlay').classList.add('open');
  document.getElementById('reviewPanel').classList.add('open');
}
function closeReview(){
  document.getElementById('reviewOverlay').classList.remove('open');
  document.getElementById('reviewPanel').classList.remove('open');
}

// ── Render ──
function render(){
  renderInfo();renderPlayers();renderBoard();renderLog();renderChecklist();renderActions();
  document.getElementById('showdownPanel').style.display='none';
}

function renderInfo(){
  const hBBs=Math.round(S.heroStack/S.bbSize);
  const vBBs=Math.round(S.villStack/S.bbSize);
  document.getElementById('infoChips').innerHTML=
    `<div class="chip">Blinds: <b>${S.bbSize/2}/${S.bbSize}</b></div>`+
    `<div class="chip">Street: <b>${cap(S.street)}</b></div>`+
    `<div class="chip">Hero: <b>${S.heroPos}</b></div>`+
    `<div class="chip">Villain: <b>${S.villPos}</b></div>`+
    `<div class="chip">Effective: <b>${Math.min(hBBs,vBBs)}BB</b></div>`+
    (S.street!=='preflop'?`<div class="chip">${S.heroIsIP?'<b style="color:#22c55e">Hero IP ▲</b>':'<b style="color:#ef4444">Hero OOP ▼</b>'}</div>`:'');
  document.getElementById('situationBar').innerHTML=S.preflopNarrative;
}

function renderPlayers(){
  const hBBs=Math.round(S.heroStack/S.bbSize);
  const vBBs=Math.round(S.villStack/S.bbSize);
  const hm=stackMode(hBBs);
  document.getElementById('heroName').innerHTML=`You <span class="pos-tag hero">${S.heroPos}</span>`;
  document.getElementById('heroStack').textContent=fc(S.heroStack);
  document.getElementById('heroBBInfo').innerHTML=`<b>${hBBs}BB</b> remaining`;
  document.getElementById('heroModeEl').innerHTML=`<div class="stack-mode-badge ${hm.cls}">${hm.label}</div>`;
  document.getElementById('heroCards').innerHTML=S.heroCards.map(c=>cardHTML(c)).join('');

  // Range check button + reveal
  const ri=getHeroRangeInfo();
  let rangeHtml='';
  if(ri){
    if(!S.rangeRevealed){
      rangeHtml=`<button class="range-check-btn" onclick="toggleRangeReveal()">In range? &#9660;</button>`;
    } else {
      let rangeLines='';
      if(ri.isBB){
        const icon=ri.inRange?'\u2705':'\u274c';
        const cls=ri.inRange?'in-range':'out-range';
        const thresh=ri.threshold?` \u25b6 lowest: <b>${ri.threshold.hand}</b>`:'';
        rangeLines=`<div class="range-result ${cls}">${icon} ${ri.label} \u00b7 ${ri.pct} \u00b7 ${ri.tier}BB${thresh}</div>`;
      } else {
        if(ri.open){
          const icon=ri.open.inRange?'\u2705':'\u274c';
          const cls=ri.open.inRange?'in-range':'out-range';
          const c1=S.heroCards[0],c2=S.heroCards[1];
          const tbl=RANGES[ri.tier];
          const openThresh=(tbl&&tbl[ri.pos]&&tbl[ri.pos].open)
            ?getLowestInRangeForHighCard(c1,c2,tbl[ri.pos].open.str):null;
          const openThreshLine=openThresh?` \u25b6 ${openThresh.isFallback?'range floor':'lowest'}: <b>${openThresh.hand}</b>`:'';
          rangeLines+=`<div class="range-result ${cls}" style="margin-bottom:4px">${icon} Opening range \u00b7 ${ri.open.pct} \u00b7 ${ri.pos} ${ri.tier}BB${openThreshLine}</div>`;
        }
        if(ri.steal){
          const icon=ri.steal.inRange?'\u2705':'\u274c';
          const cls=ri.steal.inRange?'in-range':'out-range';
          const c1=S.heroCards[0],c2=S.heroCards[1];
          const tbl=RANGES[ri.tier];
          const stealThresh=(tbl&&tbl[ri.pos]&&tbl[ri.pos].steal)
            ?getLowestInRangeForHighCard(c1,c2,tbl[ri.pos].steal.str):null;
          const stealThreshLine=stealThresh?` \u25b6 ${stealThresh.isFallback?'range floor':'lowest'}: <b>${stealThresh.hand}</b>`:'';
          rangeLines+=`<div class="range-result ${cls}">${icon} Steal range \u00b7 ${ri.steal.pct} \u00b7 ${ri.pos} ${ri.tier}BB${stealThreshLine}</div>`;
        }
      }
      rangeHtml=`<button class="range-check-btn" onclick="toggleRangeReveal()">In range? &#9650;</button>${rangeLines}`;
    }
  }
  document.getElementById('heroRangeCheck').innerHTML=rangeHtml;
  document.getElementById('villainName').innerHTML=`Villain <span class="pos-tag">${S.villPos}</span>`;
  document.getElementById('villainStack').textContent=fc(S.villStack);
  document.getElementById('villainBBInfo').innerHTML=`<b>${vBBs}BB</b> remaining`;
  document.getElementById('villainCards').innerHTML=S.villCards.map(c=>cardHTML(c,!S.villRevealed)).join('');
  document.getElementById('revealBtn').style.display=S.villRevealed?'none':'block';
  document.getElementById('potAmt').textContent=fc(S.pot);
  document.getElementById('potBB').textContent=(S.pot/S.bbSize).toFixed(1)+'BB';
}

function renderBoard(){
  const counts={preflop:0,flop:3,turn:4,river:5};
  const n=counts[S.street]||0;
  if(n===0){document.getElementById('boardPanel').style.display='none';return;}
  document.getElementById('boardPanel').style.display='block';
  document.getElementById('streetBadge').textContent=S.street;
  let h='';
  for(let i=0;i<5;i++) h+=i<n?cardHTML(S.boardAll[i]):'<div class="card-ph"></div>';
  document.getElementById('boardCards').innerHTML=h;
}

function renderLog(){
  const lines=[`<span class="log-hi">${S.preflopNarrative}</span>`,...S.log.slice(-15)];
  document.getElementById('logPanel').innerHTML=lines.join('<br>');
}

function addLog(msg,type=''){
  const cls=type==='hero'?'log-hero':type==='villain'?'log-villain':type==='street'?'log-street':'';
  let entry = msg;
  if((type==='hero'||type==='villain') && typeof S.pot==='number'){
    entry = msg + `<span style="color:var(--amber);opacity:0.65;font-size:0.85em;margin-left:8px">[pot: ${fc(S.pot)}]</span>`;
  }
  S.log.push(cls?`<span class="${cls}">${entry}</span>`:entry);
}

function renderChecklist(){
  // Preserve any in-progress textarea values before re-rendering
  document.querySelectorAll('[data-qa-id]').forEach(ta=>{
    if(ta.value)S.clState[ta.dataset.qaId+'_text']=ta.value;
  });

  const panel=document.getElementById('checklistPanel');
  panel.style.display='block';
  const phases=getChecklistDef();
  const allItems=phases.flatMap(ph=>ph.items);
  const doneCount=allItems.filter(it=>itemIsDone(it.id)).length;
  const total=allItems.length;
  const allDone=doneCount===total;
  document.getElementById('clProgressBar').style.width=Math.round(doneCount/total*100)+'%';

  const boardTags=S.street!=='preflop'?getBoardTags():[];
  const strThreat=boardTags._strThreat||false;

  document.getElementById('clPhases').innerHTML=phases.map(ph=>{
    const phDone=ph.items.filter(it=>itemIsDone(it.id)).length;
    const phAllDone=phDone===ph.items.length;
    const isOpen=phaseOpen[ph.id]!==false;
    let phaseExtra='';
    if(ph.id==='ph2'&&boardTags.length>0){
      phaseExtra=`<div class="board-tags">${boardTags.map(t=>`<span class="btag ${t.cls}">${t.t}</span>`).join('')}</div>`;
      if(strThreat) phaseExtra+=`<div class="str-alert"><strong>Slow down.</strong> Connected board \u2014 straights and straight draws are likely in villain\u2019s range. Name the nut straight before acting.</div>`;
    }
    return`<div class="phase-row ${phAllDone?'done':'active'}">
      <div class="phase-header" onclick="togglePhase('${ph.id}')">
        <div class="phase-check ${phAllDone?'done':''}">${phAllDone?'\u2713':''}</div>
        <div class="phase-name">${ph.name}</div>
        <span class="phase-item-count ${phAllDone?'all-done':''}">${phDone}/${ph.items.length}</span>
        <div class="phase-chevron ${isOpen?'open':''}">&#9660;</div>
      </div>
      <div class="phase-body ${isOpen?'open':''}">
        ${phaseExtra}
        ${ph.items.map(item=>renderClItem(item)).join('')}
      </div>
    </div>`;
  }).join('');

  const note=document.getElementById('clNote');
  note.textContent=allDone
    ?'\u2713 All '+total+' items complete \u2014 actions unlocked.'
    :'Complete all '+total+' items to unlock actions. ('+doneCount+'/'+total+')';
  note.className='cl-unlock-note'+(allDone?' unlocked':'');
  renderActions();
}

function itemIsDone(id){
  const st=S.clState[id];
  return st===true||st==='correct'||st==='missed';
}

function renderClItem(item){
  const state=S.clState[item.id];
  const done=itemIsDone(item.id);

  if(item.type==='check'){
    return`<div class="cl-item ${done?'done':''}" onclick="tickItem('${item.id}')">
      <div class="cl-chk">${done?'\u2713':''}</div>
      <div class="cl-item-label">${item.label}<span class="cl-item-note">${item.note}</span></div>
    </div>`;
  }

  // Q&A item
  const text=S.clState[item.id+'_text']||'';

  if(!state){
    // Not yet submitted — show textarea
    return`<div class="cl-qa-item">
      <div class="qa-prompt">${item.label}</div>
      <textarea class="qa-textarea" data-qa-id="${item.id}" placeholder="Type your answer here\u2026">${escHtml(text)}</textarea>
      <div><button class="qa-submit-btn" onclick="submitQA('${item.id}')">Submit \u2192</button><span class="qa-hint">${item.note}</span></div>
    </div>`;
  }

  if(state==='submitted'){
    // Answer submitted — show model answer (computed at submit time) + grade buttons
    const modelHtml=S.clState[item.id+'_model']||item.modelAnswer||'';
    return`<div class="cl-qa-item">
      <div class="qa-prompt">${item.label}</div>
      <div class="qa-your-answer">Your answer: ${escHtml(text)||'<em>(blank)</em>'}</div>
      <div class="qa-model-answer"><span class="qa-model-label">Model answer</span>${modelHtml}</div>
      <div class="qa-grade-row">
        <button class="qa-correct-btn" onclick="gradeQA('${item.id}','correct')">\u2713 Covered it</button>
        <button class="qa-missed-btn" onclick="gradeQA('${item.id}','missed')">\u26a0 Missed something</button>
      </div>
    </div>`;
  }

  // Done — correct or missed — keep model answer visible
  const gradeCls=state==='missed'?'done-missed':'done-correct';
  const labelCls=state==='missed'?'missed':'correct';
  const icon=state==='missed'?'\u26a0':'\u2713';
  const modelHtml=S.clState[item.id+'_model']||item.modelAnswer||'';
  return`<div class="cl-qa-item ${gradeCls}">
    <div class="qa-done-label ${labelCls}">${icon} ${item.label}</div>
    ${text?`<div class="qa-your-answer">Your answer: ${escHtml(text)}</div>`:''}
    ${modelHtml?`<div class="qa-model-answer"><span class="qa-model-label">Model answer</span>${modelHtml}</div>`:''}
  </div>`;
}

function computeModelAnswer(fnId){
  const dispatch={
    getActionModeDesc,
    getShortStackDesc,
    getStraightAnalysis,
    getFlushDesc,
    getBoardTextureSummary,
    getRangeHitDesc,
    getRangeAdvantageDesc,
    getHandsThatHeroBeats,
    getHandsThatBeatHero,
    getDrawDesc,
    getVillainStory,
    getBetSizingGuide,
    getPotOddsModelAnswer
  };
  return dispatch[fnId]?dispatch[fnId]():'(model answer unavailable)';
}

function submitQA(id){
  const ta=document.querySelector(`[data-qa-id="${id}"]`);
  const val=ta?ta.value.trim():'';
  S.clState[id+'_text']=val||'(no answer entered)';
  // Compute model answer NOW — not before — so user cannot see it in advance
  const phases=getChecklistDef();
  const item=phases.flatMap(ph=>ph.items).find(it=>it.id===id);
  if(item){
    S.clState[id+'_model']=item.modelFnId
      ?computeModelAnswer(item.modelFnId)
      :(item.modelAnswer||'');
  }
  S.clState[id]='submitted';
  renderChecklist();
}

function gradeQA(id,grade){
  S.clState[id]=grade;
  renderChecklist();
}

function tickItem(id){S.clState[id]=!S.clState[id];renderChecklist();}
function togglePhase(id){
  document.querySelectorAll('[data-qa-id]').forEach(ta=>{if(ta.value)S.clState[ta.dataset.qaId+'_text']=ta.value;});
  const currentlyOpen=phaseOpen[id]!==false;
  phaseOpen[id]=!currentlyOpen;
  renderChecklist();
}
function clAllDone(){return getChecklistDef().flatMap(ph=>ph.items).every(it=>itemIsDone(it.id));}


function renderActions(){
  if(S.heroFolded||S.villFolded){document.getElementById('actionRow').innerHTML='';return;}
  // If hero is all-in, no actions needed — board will run out automatically
  if(S.heroStack===0){document.getElementById('actionRow').innerHTML='';return;}
  const dis=!clAllDone();
  const bb=S.bbSize;
  const heroTotalForShove=S.heroStack+(S.heroInvested||0);
  let h='';
  if(S.street==='preflop'){
    if(S.villBet>0){
      // Facing a raise at any position — always need fold/call/reraise
      const callAmt=Math.min(S.villBet,S.heroStack);
      const reraiseLabel=S.heroPos==='BB'?'3-bet \u2191':'4-bet \u2191';
      h=btn('Fold','fold','heroFold()',dis)+
        btn(`Call ${fc(callAmt)}`,'call',`heroCall(${callAmt})`,dis)+
        btn(reraiseLabel,'raise',`showRaise(${Math.round(S.villInvested*3)})`,dis)+
        btn(`All-in \u2014 ${fc(heroTotalForShove)}`,'raise',`heroShove()`,dis);
    } else if(S.heroPos==='SB'){
      h=btn('Fold','fold','heroFold()',dis)+
        btn('Complete','call',`heroCall(${Math.round(bb/2)})`,dis)+
        btn('Raise \u2191','raise',`showRaise(${bb*3})`,dis)+
        btn(`All-in \u2014 ${fc(heroTotalForShove)}`,'raise',`heroShove()`,dis);
    } else {
      const r=Math.round(rf([2.5,3,3,3.5])*bb);
      h=btn('Fold','fold','heroFold()',dis)+
        btn(`Open raise to ${fc(r)}`,'primary',`heroRaise(${r})`,dis)+
        btn('Custom size \u2191','raise',`showRaise(${r})`,dis)+
        btn(`All-in \u2014 ${fc(heroTotalForShove)}`,'raise',`heroShove()`,dis);
    }
  } else {
    const half=Math.round(S.pot*0.5/bb)*bb||bb;
    const two3=Math.round(S.pot*0.667/bb)*bb||bb;
    const three4=Math.round(S.pot*0.75/bb)*bb||bb;
    if(S.villBet>0){
      const callAmt=Math.min(S.villBet,S.heroStack);
      h=btn('Fold','fold','heroFold()',dis)+
        btn(`Call ${fc(callAmt)}`,'call',`heroCall(${callAmt})`,dis)+
        btn('Raise ↑','raise',`showRaise(${Math.round(S.villBet*2.5)})`,dis)+
        btn(`All-in — ${fc(S.heroStack)}`,'raise',`heroBetAllIn()`,dis);
    } else {
      h=btn('Check','','heroCheck()',dis)+
        btn(`Bet 50% — ${fc(half)}`,'',`heroBet(${half})`,dis)+
        btn(`Bet 67% — ${fc(two3)}`,'',`heroBet(${two3})`,dis)+
        btn(`Bet 75% — ${fc(three4)}`,'',`heroBet(${three4})`,dis)+
        btn('Custom ↑','raise',`showRaise(${two3})`,dis)+
        btn(`All-in — ${fc(S.heroStack)}`,'raise',`heroBetAllIn()`,dis);
    }
  }
  document.getElementById('actionRow').innerHTML=h;
}

function btn(label,cls,fn,disabled){
  return`<button class="abtn ${cls}" onclick="${fn}" ${disabled?'disabled':''}>${label}</button>`;
}

function showRaise(def){document.getElementById('raiseInput').value=Math.round(def);document.getElementById('raiseArea').classList.add('show');}
function hideRaise(){document.getElementById('raiseArea').classList.remove('show');}
function confirmRaise(){
  const amt=parseInt(document.getElementById('raiseInput').value)||0;
  if(amt<=0)return;hideRaise();
  if(S.street==='preflop')heroRaise(amt);else heroBet(amt);
}

function heroFold(){
  S.heroFolded=true;
  addLog(`Hero folds. Villain wins ${fc(S.pot)}.`,'hero');
  S.actionLog.push('Hero folds');
  revealVillain();showEndPanel(false,true);
}

function heroShove(){
  // Preflop all-in shove — puts in all remaining chips
  const total=S.heroStack+(S.heroInvested||0);
  S.pot+=S.heroStack; S.heroStack=0; S.heroInvested=total;
  addLog(`Hero shoves all-in for ${fc(total)}.`,'hero');
  S.actionLog.push(`Hero shoves all-in (preflop)`);
  S.clState={}; villPFResponse(total);
}

function heroBetAllIn(){
  // Postflop all-in bet/raise — puts in all remaining chips
  const amt=S.heroStack;
  S.heroStack=0; S.pot+=amt; S.villBet=0;
  addLog(`Hero bets all-in for ${fc(amt)}.`,'hero');
  S.actionLog.push(`Hero all-in bet (${S.street})`);
  S.clState={}; villRespondToBet(amt);
}

function heroRaise(amt){
  const net=amt-(S.heroInvested||0);
  S.heroStack-=net;S.pot+=net;S.heroInvested=amt;
  addLog(`Hero raises to ${fc(amt)}.`,'hero');
  S.actionLog.push(`Hero raises to ${fc(amt)} (preflop)`);
  S.clState={};villPFResponse(amt);
}

function heroCall(amt){
  S.heroStack-=amt;S.heroInvested=(S.heroInvested||0)+amt;S.pot+=amt;S.villBet=0;
  addLog(`Hero calls ${fc(amt)}.`,'hero');
  S.actionLog.push(`Hero calls ${fc(amt)}`);
  advanceStreet();
}

function heroCheck(){
  addLog('Hero checks.','hero');
  S.actionLog.push(`Hero checks (${S.street})`);
  S.villBet=0;
  if(S.heroIsIP){
    // Hero is IP — checking back closes action on this street
    advanceStreet();
  } else {
    // Hero is OOP — villain acts after hero checks
    villPostflop();
  }
}

function heroBet(amt){
  if(!amt||amt<=0)return;
  S.heroStack-=amt;S.pot+=amt;S.villBet=0;
  addLog(`Hero bets ${fc(amt)} (${Math.round(amt/(S.pot-amt)*100)}% pot).`,'hero');
  S.actionLog.push(`Hero bets ${fc(amt)} (${S.street})`);
  S.clState={};villRespondToBet(amt);
}

function villPFResponse(raiseAmt){
  // Card-aware preflop response — villain acts based on actual hole cards
  const c1=S.villCards[0], c2=S.villCards[1];
  const RVAL={A:14,K:13,Q:12,J:11,T:10,9:9,8:8,7:7,6:6,5:5,4:4,3:3,2:2};
  const r1=RVAL[c1.r], r2=RVAL[c2.r];
  const hi=Math.max(r1,r2), lo=Math.min(r1,r2);
  const suited=c1.s===c2.s;
  const paired=r1===r2;
  const gap=hi-lo;
  const bb=S.bbSize;
  const sizeMult=raiseAmt/bb; // how many BBs villain is facing

  // Classify villain's hand into a tier
  // TIER 1 — Premium: always 3-bet (AA KK QQ JJ AKs AKo)
  const isPremium = paired&&hi>=11 || (hi===14&&lo===13);
  // TIER 2 — Strong: usually 3-bet, sometimes call (TT 99 AQs AQo AJs KQs)
  const isStrong = (paired&&hi>=9) || (hi===14&&lo===12) || (hi===14&&lo===11&&suited) || (hi===13&&lo===12&&suited);
  // TIER 3 — Playable: call wide, occasional 3-bet bluff with suited connectors
  // hi>=7 catches suited connectors/one-gappers like 97s, 87s, 76s, 65s as BB defends
  const isPlayable = (paired&&hi>=2) || (suited&&gap<=2&&hi>=7) || (hi>=10&&gap<=3&&suited) || (hi===14&&lo>=2&&suited) || (hi>=11&&lo>=9&&gap<=3);
  // Everything else — weak: fold most of the time

  const noise=Math.random(); // small random element for realism

  let action;
  if(isPremium){
    action='3bet'; // always
  } else if(isStrong){
    action = noise<0.70 ? '3bet' : 'call';
  } else if(isPlayable){
    // 3-bet bluff frequency goes down as open size goes up
    const threeBetBluffFreq = sizeMult<=3 ? 0.12 : 0.05;
    // BB pocket pairs: implied odds for set mining make folding almost never correct
    const isBBPair = (S.villPos==='BB' && paired);
    if(isBBPair){
      // Call always; small 3-bet bluff frequency with mid pairs (77-99)
      action = (noise < 0.08 && hi>=7 && hi<=9) ? '3bet' : 'call';
    } else if(noise < threeBetBluffFreq) action='3bet';
    else if(noise < threeBetBluffFreq+0.62) action='call';
    else action='fold';
  } else {
    // Weak hand — fold most of the time, occasional loose call
    action = noise<0.15 ? 'call' : 'fold';
  }

  if(action==='fold'){
    addLog('Villain folds.','villain');S.villFolded=true;
    S.actionLog.push('Villain folds preflop');
    revealVillain();showEndPanel(true,false);
  } else if(action==='call' || S.heroStack===0){
    // If hero is all-in, villain can only call or fold — no 3-bet possible
    const net=Math.min(raiseAmt,S.villStack)-(S.villInvested||0);
    S.villStack-=net; S.villInvested=(S.villInvested||0)+net; S.pot+=net; S.villBet=0;
    addLog('Villain calls.','villain'); S.actionLog.push('Villain calls'); advanceStreet();
  } else {
    const mult=rf([2.5,3,3.5]);
    const rr=Math.round(raiseAmt*mult);
    const net2=rr-(S.villInvested||0);
    S.villStack-=net2;S.villInvested=rr;S.pot+=net2;S.villBet=rr-raiseAmt;
    addLog(`Villain 3-bets to ${fc(rr)}.`,'villain');
    S.actionLog.push(`Villain 3-bets to ${fc(rr)}`);
    S.clState={};renderChecklist();renderActions();renderPlayers();renderLog();
  }
}

// ── Card-aware villain postflop hand strength ──────────────────────────────
function getVillainPostflopTier(){
  const count={flop:3,turn:4,river:5}[S.street]||0;
  if(!count)return'medium';
  const board=S.boardAll.slice(0,count);
  const vh=evalHand(S.villCards,board);
  const RVAL={A:14,K:13,Q:12,J:11,T:10,'9':9,'8':8,'7':7,'6':6,'5':5,'4':4,'3':3,'2':2};

  // rank: 8=SF,7=quads,6=FH,5=flush,4=straight,3=trips,2=two pair,1=pair,0=high card
  if(vh.rank>=2)return'monster';   // two pair, trips, straight, flush, FH, quads, SF

  if(vh.rank===1){
    const pairRank=vh.tb[0];
    const boardRanks=board.map(c=>RVAL[c.r]).sort((a,b)=>b-a);
    const vRanks=S.villCards.map(c=>RVAL[c.r]);
    const isPocketPair=vRanks[0]===vRanks[1];
    const boardMax=boardRanks[0];
    // Overpair: pocket pair both cards above highest board card
    if(isPocketPair&&vRanks[0]>boardMax)return'strong';
    // Top pair decent kicker (kicker >= T)
    if(pairRank===boardMax&&vh.tb[1]>=10)return'strong';
    // Top pair weak kicker, middle pair, bottom pair
    return'medium';
  }

  // High card only — check for strong draw equity
  // If villain has 2 overcards to the board, treat as medium (they'll float more)
  const vRanks2=S.villCards.map(c=>RVAL[c.r]);
  const boardMax2=Math.max(...board.map(c=>RVAL[c.r]));
  const overcards=vRanks2.filter(r=>r>boardMax2).length;
  if(overcards===2)return'weak-draw';  // two overcards — float sometimes
  return'weak';
}

// Villain bet sizing — picks a fraction and converts to chip amount
function villBetSize(){
  const frac=rf([0.45,0.5,0.6,0.667,0.75]);
  const amt=Math.round(S.pot*frac/S.bbSize)*S.bbSize||S.bbSize;
  return{frac,amt};
}

function villPostflop(){
  const tier=getVillainPostflopTier();
  const r=Math.random();
  // Check frequencies by tier: monster=25% check, strong=30%, medium=60%, weak=80%, weak-draw=70%
  const checkFreq={monster:0.25,strong:0.30,medium:0.60,weak:0.80,'weak-draw':0.70};
  const freq=checkFreq[tier]||0.50;
  if(r<freq){
    addLog('Villain checks.','villain');S.actionLog.push(`Villain checks (${S.street})`);
    advanceStreet();
  } else {
    const{frac,amt}=villBetSize();
    S.villStack-=amt;S.pot+=amt;S.villBet=amt;
    addLog(`Villain bets ${fc(amt)} (${Math.round(frac*100)}% pot).`,'villain');
    S.actionLog.push(`Villain bets ${fc(amt)} (${S.street})`);
    S.clState={};renderChecklist();renderActions();renderPlayers();renderLog();
  }
}

// Villain acts FIRST on new street — used when hero is IP (hero acts after villain)
function villActFirst(){
  renderPlayers();
  const tier=getVillainPostflopTier();
  const r=Math.random();
  const checkFreq={monster:0.35,strong:0.40,medium:0.65,weak:0.85,'weak-draw':0.75};
  const freq=checkFreq[tier]||0.55;
  if(r<freq){
    addLog('Villain checks.','villain');S.actionLog.push(`Villain checks (${S.street})`);
    S.villBet=0;
    renderChecklist();renderActions();renderPlayers();renderLog();
  } else {
    const{frac,amt}=villBetSize();
    S.villStack-=amt;S.pot+=amt;S.villBet=amt;
    addLog(`Villain bets ${fc(amt)} (${Math.round(frac*100)}% pot).`,'villain');
    S.actionLog.push(`Villain bets ${fc(amt)} (${S.street})`);
    S.clState={};renderChecklist();renderActions();renderPlayers();renderLog();
  }
}

function villRespondToBet(betAmt){
  const tier=getVillainPostflopTier();
  const r=Math.random();
  // Bet size relative to pot BEFORE bet
  const preBetPot=S.pot-betAmt;
  const betFrac=preBetPot>0?betAmt/preBetPot:1;
  const large=betFrac>0.67;
  const small=betFrac<0.34;

  // Fold / call / raise thresholds by tier and bet size
  // [foldThreshold, raiseFloor]  — call fills the middle
  let foldT, raiseF;
  if(tier==='monster'){
    foldT=0;
    raiseF=small?0.50:large?0.70:0.60;
  } else if(tier==='strong'){
    foldT=small?0.02:large?0.05:0.03;
    raiseF=small?0.30:large?0.18:0.25;
  } else if(tier==='medium'){
    foldT=small?0.15:large?0.55:0.35;
    raiseF=small?0.10:large?0.04:0.07;
  } else if(tier==='weak-draw'){
    foldT=small?0.30:large?0.60:0.45;
    raiseF=small?0.08:large?0.03:0.05;
  } else {
    // weak / air
    foldT=small?0.50:large?0.82:0.68;
    raiseF=small?0.05:large?0.02:0.03;
  }

  // raiseF is the probability mass ABOVE call that triggers a raise
  // i.e. if r < foldT → fold, r > (1-raiseF) → raise, else call
  if(r<foldT){
    addLog('Villain folds.','villain');S.villFolded=true;
    S.actionLog.push('Villain folds');revealVillain();showEndPanel(true,false);
  } else if(r>(1-raiseF)&&S.heroStack>0){
    const mult=rf([2.2,2.5,3]);
    const rr=Math.min(Math.round(betAmt*mult),S.villStack+betAmt);
    S.villStack-=rr;S.pot+=rr;S.villBet=rr;
    addLog(`Villain raises to ${fc(rr)}.`,'villain');
    S.actionLog.push(`Villain raises to ${fc(rr)} (${S.street})`);
    S.clState={};renderChecklist();renderActions();renderPlayers();renderLog();
  } else {
    const callAmt=Math.min(betAmt,S.villStack);
    S.villStack-=callAmt;S.pot+=callAmt;S.villBet=0;
    addLog('Villain calls.','villain');S.actionLog.push(`Villain calls (${S.street})`);
    advanceStreet();
  }
}

function advanceStreet(){
  S.villBet=0; S.clState={};
  const order=['preflop','flop','turn','river'];
  const idx=order.indexOf(S.street);

  // All-in detected — run out remaining streets automatically, then showdown
  if(S.heroStack===0 || S.villStack===0){
    const remaining=order.slice(idx+1);
    for(const st of remaining){
      S.street=st;
      addLog(`— ${S.street.toUpperCase()} (run out) —`,'street');
    }
    renderBoard(); renderLog(); renderPlayers();
    goToShowdown();
    return;
  }

  if(idx<3){
    S.street=order[idx+1];
    addLog(`— ${S.street.toUpperCase()} —`,'street');
    renderBoard();renderLog();renderInfo();
    if(S.heroIsIP){
      villActFirst();  // villain leads on new street when hero is IP
    } else {
      renderChecklist();renderActions();renderPlayers();
    }
  } else {
    goToShowdown();
  }
}

function goToShowdown(){
  revealVillain();
  const hh=evalHand(S.heroCards,S.boardAll);
  const vh=evalHand(S.villCards,S.boardAll);
  const cmp=compareHands(hh,vh);
  const heroW=cmp>0,tie=cmp===0;
  addLog('— SHOWDOWN —','street');
  addLog(`Hero: ${S.heroCards.map(c=>c.r+SYM[c.s]).join(' ')} — ${hh.desc}`);
  addLog(`Villain: ${S.villCards.map(c=>c.r+SYM[c.s]).join(' ')} — ${vh.desc}`);
  addLog(heroW?`Hero wins ${fc(S.pot)}!`:tie?'Split pot.':'Villain wins.');
  renderLog();
  document.getElementById('checklistPanel').style.display='none';
  document.getElementById('actionRow').innerHTML='';
  showEndPanel(heroW,false,tie,hh,vh);
}

function showEndPanel(heroWins,heroFolded,tie=false,hh=null,vh=null){
  document.getElementById('actionRow').innerHTML='';
  document.getElementById('checklistPanel').style.display='none';
  const panel=document.getElementById('showdownPanel');
  panel.style.display='block';
  let html='';
  if(heroFolded){
    html=`<div>Hero folded — cards: <b>${S.heroCards.map(c=>c.r+SYM[c.s]).join(' ')}</b></div>
          <div>Villain had: <b>${S.villCards.map(c=>c.r+SYM[c.s]).join(' ')}</b></div>
          <div class="sd-loser" style="margin-top:8px">Villain wins ${fc(S.pot)}.</div>`;
  } else if(S.villFolded){
    html=`<div>Villain folded — cards: <b>${S.villCards.map(c=>c.r+SYM[c.s]).join(' ')}</b></div>
          <div class="sd-winner" style="margin-top:8px">Hero wins ${fc(S.pot)}!</div>`;
  } else if(hh&&vh){
    html=`<div>Hero: <b>${S.heroCards.map(c=>c.r+SYM[c.s]).join(' ')}</b> — ${hh.desc}</div>
          <div>Villain: <b>${S.villCards.map(c=>c.r+SYM[c.s]).join(' ')}</b> — ${vh.desc}</div>
          <div style="margin-top:8px" class="${heroWins?'sd-winner':tie?'':'sd-loser'}">
          ${heroWins?'Hero wins '+fc(S.pot)+'!':tie?'Split pot.':'Villain wins.'}</div>`;
  }
  document.getElementById('sdResult').innerHTML=html;
}

function revealVillain(){

// ── Hand evaluator ──
function getCombos(arr,k){
  if(k===arr.length)return[arr];if(k===1)return arr.map(x=>[x]);
  const r=[];
  for(let i=0;i<=arr.length-k;i++)
    for(const rest of getCombos(arr.slice(i+1),k-1)) r.push([arr[i],...rest]);
  return r;
}
function evalHand(hole,board){
  const all=[...hole,...board];let best=null;
  for(const c of getCombos(all,5)){
    const v=eval5(c);
    if(!best||v.rank>best.rank||(v.rank===best.rank&&cmpArr(v.tb,best.tb)>0)) best=v;
  }
  return best;
}
function eval5(cards){
  const vs=cards.map(c=>RVMAP[c.r]).sort((a,b)=>b-a);
  const suits=cards.map(c=>c.s);
  const fl=suits.every(s=>s===suits[0]);
  const st=checkStraight(vs);
  const cnt={};vs.forEach(v=>cnt[v]=(cnt[v]||0)+1);
  const freq=Object.values(cnt).sort((a,b)=>b-a);
  const bc=Object.entries(cnt).sort((a,b)=>b[1]-a[1]||b[0]-a[0]);
  if(fl&&st.is){const h=st.high;return{rank:8,tb:[h],desc:h===14?'Royal flush':`Straight flush, ${RN[h]} high`};}
  if(freq[0]===4){const q=+bc[0][0],k=+bc[1][0];return{rank:7,tb:[q,k],desc:`Four ${RN[q]}s`};}
  if(freq[0]===3&&freq[1]===2){const t=+bc[0][0],p=+bc[1][0];return{rank:6,tb:[t,p],desc:`Full house, ${RN[t]}s full of ${RN[p]}s`};}
  if(fl)return{rank:5,tb:vs,desc:`Flush, ${RN[vs[0]]} high`};
  if(st.is)return{rank:4,tb:[st.high],desc:`Straight, ${RN[st.high]} high`};
  if(freq[0]===3){const t=+bc[0][0],ks=bc.slice(1).map(x=>+x[0]);return{rank:3,tb:[t,...ks],desc:`Three ${RN[t]}s`};}
  if(freq[0]===2&&freq[1]===2){const p1=+bc[0][0],p2=+bc[1][0],k=+bc[2][0];return{rank:2,tb:[p1,p2,k],desc:`Two pair, ${RN[p1]}s and ${RN[p2]}s`};}
  if(freq[0]===2){const p=+bc[0][0],ks=bc.slice(1).map(x=>+x[0]);return{rank:1,tb:[p,...ks],desc:`Pair of ${RN[p]}s`};}
  return{rank:0,tb:vs,desc:`${RN[vs[0]]} high`};
}
function checkStraight(sv){
  const u=[...new Set(sv)];
  for(let i=0;i<=u.length-5;i++) if(u[i]-u[i+4]===4) return{is:true,high:u[i]};
  if([14,2,3,4,5].every(v=>u.includes(v))) return{is:true,high:5};
  return{is:false};
}
function cmpArr(a,b){
  for(let i=0;i<Math.min(a.length,b.length);i++) if(a[i]!==b[i]) return a[i]-b[i];
  return 0;
}
function compareHands(a,b){
  if(a.rank!==b.rank)return a.rank-b.rank;return cmpArr(a.tb,b.tb);
}
