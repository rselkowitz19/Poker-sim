       note:'Dry = rainbow, disconnected \u2192 \u2153 pot OK \u00b7 Semi-wet = one threat \u2192 \u00bd\u2013\u2154 pot \u00b7 Wet = connected + suited \u2192 \u2154+ pot, charge draws now.',
       modelFnId:'getBoardTextureSummary'}
    ]});

    phases.push({id:'ph3',name:'Phase 3 \u2014 Range advantage',items:[
      {id:'p3i1',type:'qa',
       label:'Who raised preflop? How does their range connect with this board?',
       note:'UTG opener hits K-7-2 hard. BTN opener hits J-T-8 wide. The raiser should be betting \u2014 not auto-checking.',
       modelFnId:'getRangeHitDesc'},
      {id:'p3i2',type:'qa',
       label:'Who has range advantage here \u2014 you or villain? Why?',
       note:'Range advantage \u2192 bet with a plan. Villain advantage \u2192 need equity or a real reason before betting.',
       modelFnId:'getRangeAdvantageDesc'},
      {id:'p3i3',type:'qa',
       label:'What villain type are you facing? Name them.',
       note:'Recreational (calling station) \u00b7 Unknown \u00b7 Regular. At ClubWPT: default to recreational.',
       modelAnswer:'At ClubWPT: assume <b>recreational (calling station)</b> until proven otherwise. They call too wide and rarely bluff. Large bets and check-raises indicate real strength 80%+ of the time.'},
      {id:'p3i4',type:'check',
       label:'Large bet heuristic \u2014 is villain making an oversized bet or check-raise?',
       note:'If YES \u2192 strength 80%+. Slow down. This does NOT apply to standard 50\u201367% pot bets \u2014 only oversized bets and check-raises.'}
    ]});

    phases.push({id:'ph4',name:'Phase 4 \u2014 4-question hand analysis',items:[
      {id:'p4i1',type:'qa',
       label:'Q1 \u2014 What hands are you beating right now? List them.',
       note:'Specific hand categories: weaker pairs, draws, air. Short list = caution. Long list = confidence.',
       modelFnId:'getHandsThatHeroBeats'},
      {id:'p4i2',type:'qa',
       label:'Q2 \u2014 What hands beat you that play exactly this way?',
       note:'Walk the action on every street. Does the sizing and sequence tell a consistent story for a strong hand?',
       modelFnId:'getHandsThatBeatHero'},
      {id:'p4i_sets',type:'check',
       label:'Did you think about sets and two pair in villain\u2019s range?',
       note:'These are the hands that will stack you. They call preflop then explode on the flop. Always account for them before continuing.'},
      {id:'p4i_tp',type:'check',
       label:'Did you remember: top pair is NOT a monster?',
       note:'Top pair is a good hand \u2014 not a monster. It is vulnerable to sets, two pair, and draws. Size accordingly and reassess every street.'},
      {id:'p4i_draws',type:'qa',
       label:'Do you have any draws? OESD, gutshot, flush draw, or backdoor? Count your outs.',
       note:'Gutshot recognition is a required step \u2014 not optional. KHL-002 was caused by invisible gutshot. Count outs even if you think you have none.',
       modelFnId:'getDrawDesc'},
      {id:'p4i3',type:'qa',
       label:'Q3 \u2014 Walk villain\u2019s story street by street. What did they do and does it make sense?',
       note:'Preflop action \u2192 flop action \u2192 turn action. Do the bet sizes and sequence tell one consistent story for a specific hand? Inconsistent = possible bluff or weakness.',
       modelFnId:'getVillainStory'},
      {id:'p4i4',type:'qa',
       label:'Q4 \u2014 Name your goal with this action: VALUE / PROTECTION / FOLD EQUITY / BLUFF',
       note:'You must be able to name one goal. If you cannot \u2014 check is the default action.',
       modelAnswer:'<b>VALUE:</b> I want worse hands to call and will get called. <b>PROTECTION:</b> I want draws to fold and pay to continue. <b>FOLD EQUITY:</b> I want better hands to fold \u2014 villain is capped. <b>BLUFF:</b> I have little equity and want villain to fold right now. \u2014 If none of these is clearly true, check.'}
    ]});

    phases.push({id:'ph5',name:'Phase 5 \u2014 Bet sizing',items:[
      {id:'p5i1',type:'qa',
       label:'State your bet size and justify it using all three factors: board, hand, and player type.',
       note:'Board drives sizing most. Wet = charge draws. Calling station = size up. \u2153 pot against a calling station is a leak.',
       modelFnId:'getBetSizingGuide'}
    ]});
  }

  if(S.villBet>0&&S.street!=='preflop'){
    const pot=S.pot; const vbet=S.villBet;
    const potOddsNeeded=Math.round(vbet/(pot+vbet)*100);
    const betPct=Math.round(vbet/pot*100);
    phases.push({id:'ph6',name:'Phase 6 \u2014 Pot odds & equity',items:[
      {id:'p6i1',type:'qa',
       label:`Villain bet ${fc(vbet)} (${betPct}% pot) \u2014 you need <b style="color:var(--amber)">${potOddsNeeded}% equity</b>. How many outs do you have? State your equity %.`,
       note:`Rule of 2&4: Flush (9 outs) = ${S.street==='flop'?36:18}% \u00b7 OESD (8 outs) = ${S.street==='flop'?32:16}% \u00b7 Gutshot (4 outs) = ${S.street==='flop'?16:8}% \u00b7 Two overcards (6 outs) = ${S.street==='flop'?24:12}%`,
       modelFnId:'getPotOddsModelAnswer'},
      {id:'p6i2',type:'check',
       label:`Call decision: my equity \u2265 ${potOddsNeeded}% \u2192 call justified \u00b7 equity < ${potOddsNeeded}% \u2192 need implied odds or fold`,
       note:'If close to the threshold, consider implied odds: how much will you win when you hit? Implied odds favor deep stacks and hidden draws.'}
    ]});
  }

  return phases;
}

function getBoardStr(){
  const count=S.street==='flop'?3:S.street==='turn'?4:S.street==='river'?5:0;
  return S.boardAll.slice(0,count).map(c=>c.r+SYM[c.s]).join(' ');
}

// ── Review panel ──
function openReview(){
  const phases=getChecklistDef();
  const board=getBoardStr();
  const eff=Math.min(Math.round(S.heroStack/S.bbSize),Math.round(S.villStack/S.bbSize));
  const boardTags=S.street!=='preflop'?getBoardTags():[];
  document.getElementById('reviewContext').innerHTML=
    `<b>${S.heroPos}</b> vs <b>${S.villPos}</b> &nbsp;|&nbsp; `+
    `Effective: <b>${eff}BB</b> &nbsp;|&nbsp; `+
    `Street: <b>${cap(S.street)}</b>`+
    (board?` &nbsp;|&nbsp; Board: <b>${board}</b>`:'');
  document.getElementById('reviewBody').innerHTML=phases.map(ph=>{
    const allDone=ph.items.every(it=>S.clState[it.id]);
    let extra='';
    if(ph.id==='ph2'&&boardTags.length>0){
      extra=`<div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;">${boardTags.map(t=>`<span class="btag ${t.cls}">${t.t}</span>`).join('')}</div>`;
    }
    return`<div class="rphase">
      <div class="rphase-name">
        ${ph.name}
        <span class="${allDone?'rphase-done-tag':'rphase-pending-tag'}">${allDone?'done':'pending'}</span>
      </div>
      ${extra}
      ${ph.items.map(it=>{
        const done=!!S.clState[it.id];
        return`<div style="margin-bottom:10px;padding-left:10px;border-left:2px solid ${done?'var(--green-dim)':'var(--border2)'};">
          <div class="rphase-text" style="color:${done?'var(--text2)':'var(--text)'};">${done?'<span style="color:var(--green)">\u2713</span> ':''}${it.label}</div>
          <div style="font-size:13px;color:var(--text3);margin-top:3px;line-height:1.5;">${it.note}</div>
        </div>`;
      }).join('')}
    </div>`;
  }).join('');
  document.getElementById('reviewOverlay').classList.add('open');
  document.getElementById('reviewPanel').classList.add('open');
}
function closeReview(){
  document.getElementById('reviewOverlay').classList.remove('open');
  document.getElementById('reviewPanel').classList.remove('open');
}

// ── Render ──
function render(){
  renderInfo();renderPlayers();renderBoard();renderLog();renderChecklist();renderActions();
  document.getElementById('showdownPanel').style.display='none';
}

function renderInfo(){
  const hBBs=Math.round(S.heroStack/S.bbSize);
  const vBBs=Math.round(S.villStack/S.bbSize);
  document.getElementById('infoChips').innerHTML=
    `<div class="chip">Blinds: <b>${S.bbSize/2}/${S.bbSize}</b></div>`+
    `<div class="chip">Street: <b>${cap(S.street)}</b></div>`+
    `<div class="chip">Hero: <b>${S.heroPos}</b></div>`+
    `<div class="chip">Villain: <b>${S.villPos}</b></div>`+
    `<div class="chip">Eff: <b>${Math.min(hBBs,vBBs)}BB</b></div>`+
    (S.street!=='preflop'?`<div class="chip">${S.heroIsIP?'<b style="color:#22c55e">IP \u25b2</b>':'<b style="color:#ef4444">OOP \u25bc</b>'}</div>`:'');
  document.getElementById('situationBar').innerHTML=S.preflopNarrative;
}

function renderPlayers(){
  const hBBs=Math.round(S.heroStack/S.bbSize);
  const vBBs=Math.round(S.villStack/S.bbSize);
  const hm=stackMode(hBBs);
  document.getElementById('heroName').innerHTML=`You <span class="pos-tag hero">${S.heroPos}</span>`;
  document.getElementById('heroStack').textContent=fc(S.heroStack);
  document.getElementById('heroBBInfo').innerHTML=`<b>${hBBs}BB</b> remaining`;
  document.getElementById('heroModeEl').innerHTML=`<div class="stack-mode-badge ${hm.cls}">${hm.label}</div>`;
  document.getElementById('heroCards').innerHTML=S.heroCards.map(c=>cardHTML(c)).join('');
  document.getElementById('villainName').innerHTML=`Villain <span class="pos-tag">${S.villPos}</span>`;
  document.getElementById('villainStack').textContent=fc(S.villStack);
  document.getElementById('villainBBInfo').innerHTML=`<b>${vBBs}BB</b> remaining`;
  document.getElementById('villainCards').innerHTML=S.villCards.map(c=>cardHTML(c,!S.villRevealed)).join('');
  document.getElementById('revealBtn').style.display=S.villRevealed?'none':'block';
  document.getElementById('potAmt').textContent=fc(S.pot);
  document.getElementById('potBB').textContent=(S.pot/S.bbSize).toFixed(1)+'BB';
}

function renderBoard(){
  const counts={preflop:0,flop:3,turn:4,river:5};
  const n=counts[S.street]||0;
  if(n===0){document.getElementById('boardPanel').style.display='none';return;}
  document.getElementById('boardPanel').style.display='block';
  document.getElementById('streetBadge').textContent=S.street;
  let h='';
  for(let i=0;i<5;i++) h+=i<n?cardHTML(S.boardAll[i]):'<div class="card-ph"></div>';
  document.getElementById('boardCards').innerHTML=h;
}

function renderLog(){
  const panel=document.getElementById('logPanel');
  const lines=[`<span class="log-hi">${S.preflopNarrative}</span>`,...S.log.slice(-15)];
  panel.innerHTML=lines.join('<br>');
  panel.scrollTop=panel.scrollHeight;
}

function addLog(msg,type=''){
  const cls=type==='hero'?'log-hero':type==='villain'?'log-villain':type==='street'?'log-street':'';
  let entry=msg;
  if((type==='hero'||type==='villain')&&typeof S.pot==='number'){
    entry=msg+`<span style="color:var(--amber);opacity:0.65;font-size:0.85em;margin-left:8px">[pot: ${fc(S.pot)}]</span>`;
  }
  S.log.push(cls?`<span class="${cls}">${entry}</span>`:entry);
}

function renderChecklist(){
  document.querySelectorAll('[data-qa-id]').forEach(ta=>{
    if(ta.value)S.clState[ta.dataset.qaId+'_text']=ta.value;
  });
  const panel=document.getElementById('checklistPanel');
  panel.style.display='block';
  const phases=getChecklistDef();
  const allItems=phases.flatMap(ph=>ph.items);
  const doneCount=allItems.filter(it=>itemIsDone(it.id)).length;
  const total=allItems.length;
  const allDone=doneCount===total;
  document.getElementById('clProgressBar').style.width=Math.round(doneCount/total*100)+'%';
  const boardTags=S.street!=='preflop'?getBoardTags():[];
  const strThreat=boardTags._strThreat||false;
  document.getElementById('clPhases').innerHTML=phases.map(ph=>{
    const phDone=ph.items.filter(it=>itemIsDone(it.id)).length;
    const phAllDone=phDone===ph.items.length;
    const isOpen=!!S.clState[ph.id+'_open'];
    let phaseExtra='';
    if(ph.id==='ph2'&&boardTags.length>0){
      phaseExtra=`<div class="board-tags">${boardTags.map(t=>`<span class="btag ${t.cls}">${t.t}</span>`).join('')}</div>`;
      if(strThreat) phaseExtra+=`<div class="str-alert"><strong>Slow down.</strong> Connected board \u2014 straights and straight draws are likely in villain\u2019s range. Name the nut straight before acting.</div>`;
    }
    return`<div class="phase-row ${phAllDone?'done':'active'}">
      <div class="phase-header" onclick="togglePhase('${ph.id}')">
        <div class="phase-check ${phAllDone?'done':''}">${phAllDone?'\u2713':''}</div>
        <div class="phase-name">${ph.name}</div>
        <span class="phase-item-count ${phAllDone?'all-done':''}">${phDone}/${ph.items.length}</span>
        <div class="phase-chevron ${isOpen?'open':''}">&#9660;</div>
      </div>
      <div class="phase-body ${isOpen?'open':''}">
        ${phaseExtra}
        ${ph.items.map(item=>renderClItem(item)).join('')}
      </div>
    </div>`;
  }).join('');
  const note=document.getElementById('clNote');
  note.textContent=allDone
    ?'\u2713 All '+total+' items complete \u2014 actions unlocked.'
    :'Complete all '+total+' items to unlock actions. ('+doneCount+'/'+total+')';
  note.className='cl-unlock-note'+(allDone?' unlocked':'');
  renderActions();
}

function itemIsDone(id){
  const st=S.clState[id];
  return st===true||st==='correct'||st==='missed';
}

function renderClItem(item){
  const state=S.clState[item.id];
  const done=itemIsDone(item.id);
  if(item.type==='check'){
    return`<div class="cl-item ${done?'done':''}" onclick="tickItem('${item.id}')">
      <div class="cl-chk">${done?'\u2713':''}</div>
      <div class="cl-item-label">${item.label}<span class="cl-item-note">${item.note}</span></div>
    </div>`;
  }
  const text=S.clState[item.id+'_text']||'';
  if(!state){
    return`<div class="cl-qa-item">
      <div class="qa-prompt">${item.label}</div>
      <textarea class="qa-textarea" data-qa-id="${item.id}" placeholder="Type your answer here\u2026">${escHtml(text)}</textarea>
      <div><button class="qa-submit-btn" onclick="submitQA('${item.id}')">Submit \u2192</button><span class="qa-hint">${item.note}</span></div>
    </div>`;
  }
  if(state==='submitted'){
    const modelHtml=S.clState[item.id+'_model']||item.modelAnswer||'';
    return`<div class="cl-qa-item">
      <div class="qa-prompt">${item.label}</div>
      <div class="qa-your-answer">Your answer: ${escHtml(text)||'<em>(blank)</em>'}</div>
      <div class="qa-model-answer"><span class="qa-model-label">Model answer</span>${modelHtml}</div>
      <div class="qa-grade-row">
        <button class="qa-correct-btn" onclick="gradeQA('${item.id}','correct')">\u2713 Covered it</button>
        <button class="qa-missed-btn" onclick="gradeQA('${item.id}','missed')">\u26a0 Missed something</button>
      </div>
    </div>`;
  }
  const gradeCls=state==='missed'?'done-missed':'done-correct';
  const labelCls=state==='missed'?'missed':'correct';
  const icon=state==='missed'?'\u26a0':'\u2713';
  const labelText=item.label.replace(/<[^>]+>/g,'').substring(0,70);
  return`<div class="cl-qa-item ${gradeCls}">
    <div class="qa-done-label ${labelCls}">${icon} ${labelText}</div>
    ${text?`<div class="qa-done-answer">${escHtml(text)}</div>`:''}
  </div>`;
}

function computeModelAnswer(fnId){
  const dispatch={
    getActionModeDesc,getShortStackDesc,getStraightAnalysis,getFlushDesc,
    getBoardTextureSummary,getRangeHitDesc,getRangeAdvantageDesc,
    getHandsThatHeroBeats,getHandsThatBeatHero,getDrawDesc,
    getVillainStory,getBetSizingGuide,getPotOddsModelAnswer
  };
  return dispatch[fnId]?dispatch[fnId]():'(model answer unavailable)';
}

function submitQA(id){
  const ta=document.querySelector(`[data-qa-id="${id}"]`);
  const val=ta?ta.value.trim():'';
  S.clState[id+'_text']=val||'(no answer entered)';
  const phases=getChecklistDef();
  const item=phases.flatMap(ph=>ph.items).find(it=>it.id===id);
  if(item){
    S.clState[id+'_model']=item.modelFnId
      ?computeModelAnswer(item.modelFnId)
      :(item.modelAnswer||'');
  }
  S.clState[id]='submitted';
  renderChecklist();
}

function gradeQA(id,grade){S.clState[id]=grade;renderChecklist();}
function tickItem(id){S.clState[id]=!S.clState[id];renderChecklist();}
function togglePhase(id){
  document.querySelectorAll('[data-qa-id]').forEach(ta=>{if(ta.value)S.clState[ta.dataset.qaId+'_text']=ta.value;});
  S.clState[id+'_open']=!S.clState[id+'_open'];renderChecklist();
}
function clAllDone(){return getChecklistDef().flatMap(ph=>ph.items).every(it=>itemIsDone(it.id));}

function renderActions(){
  if(S.heroFolded||S.villFolded){document.getElementById('actionRow').innerHTML='';return;}
  if(S.heroStack===0){document.getElementById('actionRow').innerHTML='';return;}
  const dis=!clAllDone();
  const bb=S.bbSize;
  const heroTotalForShove=S.heroStack+(S.heroInvested||0);
  let h='';
  if(S.street==='preflop'){
    if(S.villBet>0){
      const callAmt=Math.min(S.villBet,S.heroStack);
      const reraiseLabel=S.heroPos==='BB'?'3-bet \u2191':'4-bet \u2191';
      h=btn('Fold','fold','heroFold()',dis)+
        btn(`Call ${fc(callAmt)}`,'call',`heroCall(${callAmt})`,dis)+
        btn(reraiseLabel,'raise',`showRaise(${Math.round(S.villInvested*3)})`,dis)+
        btn(`All-in \u2014 ${fc(heroTotalForShove)}`,'raise',`heroShove()`,dis);
    } else if(S.heroPos==='SB'){
      h=btn('Fold','fold','heroFold()',dis)+
        btn('Complete','call',`heroCall(${Math.round(bb/2)})`,dis)+
        btn('Raise \u2191','raise',`heroRaise(${bb*3})`,dis)+
        btn('Custom \u2191','',`showRaise(${bb*3})`,dis)+
        btn(`All-in \u2014 ${fc(heroTotalForShove)}`,'raise',`heroShove()`,dis);
    } else {
      const r=Math.round(rf([2.5,3,3,3.5])*bb);
      h=btn('Fold','fold','heroFold()',dis)+
        btn(`Open to ${fc(r)}`,'primary',`heroRaise(${r})`,dis)+
        btn('Custom \u2191','raise',`showRaise(${r})`,dis)+
        btn(`All-in \u2014 ${fc(heroTotalForShove)}`,'raise',`heroShove()`,dis);
    }
  } else {
    const half=Math.round(S.pot*0.5/bb)*bb||bb;
    const two3=Math.round(S.pot*0.667/bb)*bb||bb;
    const three4=Math.round(S.pot*0.75/bb)*bb||bb;
    if(S.villBet>0){
      const callAmt=Math.min(S.villBet,S.heroStack);
      h=btn('Fold','fold','heroFold()',dis)+
        btn(`Call ${fc(callAmt)}`,'call',`heroCall(${callAmt})`,dis)+
        btn('Raise \u2191','raise',`showRaise(${Math.round(S.villBet*2.5)})`,dis)+
        btn(`All-in \u2014 ${fc(S.heroStack)}`,'raise',`heroBetAllIn()`,dis);
    } else {
      h=btn('Check','','heroCheck()',dis)+
        btn(`Bet 50% \u2014 ${fc(half)}`,'',`heroBet(${half})`,dis)+
        btn(`Bet 67% \u2014 ${fc(two3)}`,'',`heroBet(${two3})`,dis)+
        btn(`Bet 75% \u2014 ${fc(three4)}`,'',`heroBet(${three4})`,dis)+
        btn('Custom \u2191','raise',`showRaise(${two3})`,dis)+
        btn(`All-in \u2014 ${fc(S.heroStack)}`,'raise',`heroBetAllIn()`,dis);
    }
  }
  document.getElementById('actionRow').innerHTML=h;
}

function btn(label,cls,fn,disabled){
  return`<button class="abtn ${cls}" onclick="${fn}" ${disabled?'disabled':''}>${label}</button>`;
}

function showRaise(def){
  document.getElementById('raiseInput').value=Math.round(def);
  document.getElementById('raiseArea').classList.add('show');
}
function hideRaise(){document.getElementById('raiseArea').classList.remove('show');}
function confirmRaise(){
  const amt=parseInt(document.getElementById('raiseInput').value)||0;
  if(amt<=0)return;hideRaise();
  if(S.street==='preflop')heroRaise(amt);else heroBet(amt);
}

function heroFold(){
  S.heroFolded=true;
  addLog(`Hero folds. Villain wins ${fc(S.pot)}.`,'hero');
  S.actionLog.push('Hero folds');
  revealVillain();showEndPanel(false,true);
}

function heroShove(){
  const total=S.heroStack+(S.heroInvested||0);
  S.pot+=S.heroStack;S.heroStack=0;S.heroInvested=total;
  addLog(`Hero shoves all-in for ${fc(total)}.`,'hero');
  S.actionLog.push(`Hero shoves all-in (preflop)`);
  S.clState={};villPFResponse(total);
}

function heroBetAllIn(){
  const amt=S.heroStack;
  S.heroStack=0;S.pot+=amt;S.villBet=0;
  addLog(`Hero bets all-in for ${fc(amt)}.`,'hero');
  S.actionLog.push(`Hero all-in bet (${S.street})`);
  S.clState={};villRespondToBet(amt);
}

function heroRaise(amt){
  const net=amt-(S.heroInvested||0);
  S.heroStack-=net;S.pot+=net;S.heroInvested=amt;
  addLog(`Hero raises to ${fc(amt)}.`,'hero');
  S.actionLog.push(`Hero raises to ${fc(amt)} (preflop)`);
  S.clState={};villPFResponse(amt);
}

function heroCall(amt){
  S.heroStack-=amt;S.heroInvested=(S.heroInvested||0)+amt;S.pot+=amt;S.villBet=0;
  addLog(`Hero calls ${fc(amt)}.`,'hero');
  S.actionLog.push(`Hero calls ${fc(amt)}`);
  advanceStreet();
}

function heroCheck(){
  addLog('Hero checks.','hero');
  S.actionLog.push(`Hero checks (${S.street})`);
  S.villBet=0;
  if(S.heroIsIP){advanceStreet();}
  else{villPostflop();}
}

function heroBet(amt){
  if(!amt||amt<=0)return;
  S.heroStack-=amt;S.pot+=amt;S.villBet=0;
  addLog(`Hero bets ${fc(amt)} (${Math.round(amt/(S.pot-amt)*100)}% pot).`,'hero');
  S.actionLog.push(`Hero bets ${fc(amt)} (${S.street})`);
  S.clState={};villRespondToBet(amt);
}

function villPFResponse(raiseAmt){
  const c1=S.villCards[0],c2=S.villCards[1];
  const RVAL={A:14,K:13,Q:12,J:11,T:10,9:9,8:8,7:7,6:6,5:5,4:4,3:3,2:2};
  const r1=RVAL[c1.r],r2=RVAL[c2.r];
  const hi=Math.max(r1,r2),lo=Math.min(r1,r2);
  const suited=c1.s===c2.s;
  const paired=r1===r2;
  const gap=hi-lo;
  const bb=S.bbSize;
  const sizeMult=raiseAmt/bb;
  const isPremium=paired&&hi>=11||(hi===14&&lo===13);
  const isStrong=(paired&&hi>=9)||(hi===14&&lo===12)||(hi===14&&lo===11&&suited)||(hi===13&&lo===12&&suited);
  const isPlayable=(paired&&hi>=2)||(hi>=10&&gap<=3&&suited)||(hi===14&&lo>=2&&suited)||(hi>=11&&lo>=9&&gap<=3);
  const noise=Math.random();
  let action;
  if(isPremium){action='3bet';}
  else if(isStrong){action=noise<0.70?'3bet':'call';}
  else if(isPlayable){
    const threeBetBluffFreq=sizeMult<=3?0.12:0.05;
    if(noise<threeBetBluffFreq)action='3bet';
    else if(noise<threeBetBluffFreq+0.62)action='call';
    else action='fold';
  } else {
    action=noise<0.15?'call':'fold';
  }
  if(action==='fold'){
    addLog('Villain folds.','villain');S.villFolded=true;
    S.actionLog.push('Villain folds preflop');
    revealVillain();showEndPanel(true,false);
  } else if(action==='call'||S.heroStack===0){
    const net=Math.min(raiseAmt,S.villStack)-(S.villInvested||0);
    S.villStack-=net;S.villInvested=(S.villInvested||0)+net;S.pot+=net;S.villBet=0;
    addLog('Villain calls.','villain');S.actionLog.push('Villain calls');advanceStreet();
  } else {
    const mult=rf([2.5,3,3.5]);
    const rr=Math.round(raiseAmt*mult);
    const net2=rr-(S.villInvested||0);
    S.villStack-=net2;S.villInvested=rr;S.pot+=net2;S.villBet=rr-raiseAmt;
    addLog(`Villain 3-bets to ${fc(rr)}.`,'villain');
    S.actionLog.push(`Villain 3-bets to ${fc(rr)}`);
    S.clState={};renderChecklist();renderActions();renderPlayers();renderLog();
  }
}

function getVillainPostflopTier(){
  const count={flop:3,turn:4,river:5}[S.street]||0;
  if(!count)return'medium';
  const board=S.boardAll.slice(0,count);
  const vh=evalHand(S.villCards,board);
  const RVAL={A:14,K:13,Q:12,J:11,T:10,'9':9,'8':8,'7':7,'6':6,'5':5,'4':4,'3':3,'2':2};
  if(vh.rank>=2)return'monster';
  if(vh.rank===1){
    const pairRank=vh.tb[0];
    const boardRanks=board.map(c=>RVAL[c.r]).sort((a,b)=>b-a);
    const vRanks=S.villCards.map(c=>RVAL[c.r]);
    const isPocketPair=vRanks[0]===vRanks[1];
    const boardMax=boardRanks[0];
    if(isPocketPair&&vRanks[0]>boardMax)return'strong';
    if(pairRank===boardMax&&vh.tb[1]>=10)return'strong';
    return'medium';
  }
  const vRanks2=S.villCards.map(c=>RVAL[c.r]);
  const boardMax2=Math.max(...board.map(c=>RVAL[c.r]));
  const overcards=vRanks2.filter(r=>r>boardMax2).length;
  if(overcards===2)return'weak-draw';
  return'weak';
}

function villBetSize(){
  const frac=rf([0.45,0.5,0.6,0.667,0.75]);
  const amt=Math.round(S.pot*frac/S.bbSize)*S.bbSize||S.bbSize;
  return{frac,amt};
}

function villPostflop(){
  const tier=getVillainPostflopTier();
  const r=Math.random();
  const checkFreq={monster:0.25,strong:0.30,medium:0.60,weak:0.80,'weak-draw':0.70};
  const freq=checkFreq[tier]||0.50;
  if(r<freq){
    addLog('Villain checks.','villain');S.actionLog.push(`Villain checks (${S.street})`);
    advanceStreet();
  } else {
    const{frac,amt}=villBetSize();
    S.villStack-=amt;S.pot+=amt;S.villBet=amt;
    addLog(`Villain bets ${fc(amt)} (${Math.round(frac*100)}% pot).`,'villain');
    S.actionLog.push(`Villain bets ${fc(amt)} (${S.street})`);
    S.clState={};renderChecklist();renderActions();renderPlayers();renderLog();
  }
}

function villActFirst(){
  renderPlayers();
  const tier=getVillainPostflopTier();
  const r=Math.random();
  const checkFreq={monster:0.35,strong:0.40,medium:0.65,weak:0.85,'weak-draw':0.75};
  const freq=checkFreq[tier]||0.55;
  if(r<freq){
    addLog('Villain checks.','villain');S.actionLog.push(`Villain checks (${S.street})`);
    S.villBet=0;
    renderChecklist();renderActions();renderPlayers();renderLog();
  } else {
    const{frac,amt}=villBetSize();
    S.villStack-=amt;S.pot+=amt;S.villBet=amt;
    addLog(`Villain bets ${fc(amt)} (${Math.round(frac*100)}% pot).`,'villain');
    S.actionLog.push(`Villain bets ${fc(amt)} (${S.street})`);
    S.clState={};renderChecklist();renderActions();renderPlayers();renderLog();
  }
}

function villRespondToBet(betAmt){
  const tier=getVillainPostflopTier();
  const r=Math.random();
  const preBetPot=S.pot-betAmt;
  const betFrac=preBetPot>0?betAmt/preBetPot:1;
  const large=betFrac>0.67;
  const small=betFrac<0.34;
  let foldT,raiseF;
  if(tier==='monster'){foldT=0;raiseF=small?0.50:large?0.70:0.60;}
  else if(tier==='strong'){foldT=small?0.02:large?0.05:0.03;raiseF=small?0.30:large?0.18:0.25;}
  else if(tier==='medium'){foldT=small?0.15:large?0.55:0.35;raiseF=small?0.10:large?0.04:0.07;}
  else if(tier==='weak-draw'){foldT=small?0.30:large?0.60:0.45;raiseF=small?0.08:large?0.03:0.05;}
  else{foldT=small?0.50:large?0.82:0.68;raiseF=small?0.05:large?0.02:0.03;}
  if(r<foldT){
    addLog('Villain folds.','villain');S.villFolded=true;
    S.actionLog.push('Villain folds');revealVillain();showEndPanel(true,false);
  } else if(r>(1-raiseF)&&S.heroStack>0){
    const mult=rf([2.2,2.5,3]);
    const rr=Math.min(Math.round(betAmt*mult),S.villStack+betAmt);
    S.villStack-=rr;S.pot+=rr;S.villBet=rr;
    addLog(`Villain raises to ${fc(rr)}.`,'villain');
    S.actionLog.push(`Villain raises to ${fc(rr)} (${S.street})`);
    S.clState={};renderChecklist();renderActions();renderPlayers();renderLog();
  } else {
    const callAmt=Math.min(betAmt,S.villStack);
    S.villStack-=callAmt;S.pot+=callAmt;S.villBet=0;
    addLog('Villain calls.','villain');S.actionLog.push(`Villain calls (${S.street})`);
    advanceStreet();
  }
}

function advanceStreet(){
  S.villBet=0;S.clState={};
  const order=['preflop','flop','turn','river'];
  const idx=order.indexOf(S.street);
  if(S.heroStack===0||S.villStack===0){
    const remaining=order.slice(idx+1);
    for(const st of remaining){
      S.street=st;
      addLog(`\u2014 ${S.street.toUpperCase()} (run out) \u2014`,'street');
    }
    renderBoard();renderLog();renderPlayers();
    goToShowdown();
    return;
  }
  if(idx<3){
    S.street=order[idx+1];
    addLog(`\u2014 ${S.street.toUpperCase()} \u2014`,'street');
    renderBoard();renderLog();renderInfo();
    if(S.heroIsIP){villActFirst();}
    else{renderChecklist();renderActions();renderPlayers();}
  } else {
    goToShowdown();
  }
}

function goToShowdown(){
  revealVillain();
  const hh=evalHand(S.heroCards,S.boardAll);
  const vh=evalHand(S.villCards,S.boardAll);
  const cmp=compareHands(hh,vh);
  const heroW=cmp>0,tie=cmp===0;
  addLog('\u2014 SHOWDOWN \u2014','street');
  addLog(`Hero: ${S.heroCards.map(c=>c.r+SYM[c.s]).join(' ')} \u2014 ${hh.desc}`);
  addLog(`Villain: ${S.villCards.map(c=>c.r+SYM[c.s]).join(' ')} \u2014 ${vh.desc}`);
  addLog(heroW?`Hero wins ${fc(S.pot)}!`:tie?'Split pot.':'Villain wins.');
  renderLog();
  document.getElementById('checklistPanel').style.display='none';
  document.getElementById('actionRow').innerHTML='';
  showEndPanel(heroW,false,tie,hh,vh);
}

function showEndPanel(heroWins,heroFolded,tie=false,hh=null,vh=null){
  document.getElementById('actionRow').innerHTML='';
  document.getElementById('checklistPanel').style.display='none';
  const panel=document.getElementById('showdownPanel');
  panel.style.display='block';
  let html='';
  if(heroFolded){
    html=`<div>Hero folded \u2014 cards: <b>${S.heroCards.map(c=>c.r+SYM[c.s]).join(' ')}</b></div>
          <div>Villain had: <b>${S.villCards.map(c=>c.r+SYM[c.s]).join(' ')}</b></div>
          <div class="sd-loser" style="margin-top:8px">Villain wins ${fc(S.pot)}.</div>`;
  } else if(S.villFolded){
    html=`<div>Villain folded \u2014 cards: <b>${S.villCards.map(c=>c.r+SYM[c.s]).join(' ')}</b></div>
          <div class="sd-winner" style="margin-top:8px">Hero wins ${fc(S.pot)}!</div>`;
  } else if(hh&&vh){
    html=`<div>Hero: <b>${S.heroCards.map(c=>c.r+SYM[c.s]).join(' ')}</b> \u2014 ${hh.desc}</div>
          <div>Villain: <b>${S.villCards.map(c=>c.r+SYM[c.s]).join(' ')}</b> \u2014 ${vh.desc}</div>
          <div style="margin-top:8px" class="${heroWins?'sd-winner':tie?'':'sd-loser'}">
          ${heroWins?'Hero wins '+fc(S.pot)+'!':tie?'Split pot.':'Villain wins.'}</div>`;
  }
  document.getElementById('sdResult').innerHTML=html;
}

function revealVillain(){
  S.villRevealed=true;
  document.getElementById('villainCards').innerHTML=S.villCards.map(c=>cardHTML(c)).join('');
  document.getElementById('revealBtn').style.display='none';
}

function legacyCopy(text){
  const ta=document.createElement('textarea');
  ta.value=text;ta.style.cssText='position:fixed;opacity:0;top:0;left:0;';
  document.body.appendChild(ta);ta.focus();ta.select();
  try{document.execCommand('copy');}catch(e){}
  document.body.removeChild(ta);
}

// ── Hand evaluator ──
function getCombos(arr,k){
  if(k===arr.length)return[arr];if(k===1)return arr.map(x=>[x]);
  const r=[];
  for(let i=0;i<=arr.length-k;i++)
    for(const rest of getCombos(arr.slice(i+1),k-1)) r.push([arr[i],...rest]);
  return r;
}
function evalHand(hole,board){
  const all=[...hole,...board];let best=null;
  for(const c of getCombos(all,5)){
    const v=eval5(c);
    if(!best||v.rank>best.rank||(v.rank===best.rank&&cmpArr(v.tb,best.tb)>0)) best=v;
  }
  return best;
}
function eval5(cards){
  const vs=cards.map(c=>RVMAP[c.r]).sort((a,b)=>b-a);
  const suits=cards.map(c=>c.s);
  const fl=suits.every(s=>s===suits[0]);
  const st=checkStraight(vs);
  const cnt={};vs.forEach(v=>cnt[v]=(cnt[v]||0)+1);
  const freq=Object.values(cnt).sort((a,b)=>b-a);
  const bc=Object.entries(cnt).sort((a,b)=>b[1]-a[1]||b[0]-a[0]);
  if(fl&&st.is){const h=st.high;return{rank:8,tb:[h],desc:h===14?'Royal flush':`Straight flush, ${RN[h]} high`};}
  if(freq[0]===4){const q=+bc[0][0],k=+bc[1][0];return{rank:7,tb:[q,k],desc:`Four ${RN[q]}s`};}
  if(freq[0]===3&&freq[1]===2){const t=+bc[0][0],p=+bc[1][0];return{rank:6,tb:[t,p],desc:`Full house, ${RN[t]}s full of ${RN[p]}s`};}
  if(fl)return{rank:5,tb:vs,desc:`Flush, ${RN[vs[0]]} high`};
  if(st.is)return{rank:4,tb:[st.high],desc:`Straight, ${RN[st.high]} high`};
  if(freq[0]===3){const t=+bc[0][0],ks=bc.slice(1).map(x=>+x[0]);return{rank:3,tb:[t,...ks],desc:`Three ${RN[t]}s`};}
  if(freq[0]===2&&freq[1]===2){const p1=+bc[0][0],p2=+bc[1][0],k=+bc[2][0];return{rank:2,tb:[p1,p2,k],desc:`Two pair, ${RN[p1]}s and ${RN[p2]}s`};}
  if(freq[0]===2){const p=+bc[0][0],ks=bc.slice(1).map(x=>+x[0]);return{rank:1,tb:[p,...ks],desc:`Pair of ${RN[p]}s`};}
  return{rank:0,tb:vs,desc:`${RN[vs[0]]} high`};
}
function checkStraight(sv){
  const u=[...new Set(sv)];
  for(let i=0;i<=u.length-5;i++) if(u[i]-u[i+4]===4) return{is:true,high:u[i]};
  if([14,2,3,4,5].every(v=>u.includes(v))) return{is:true,high:5};
  return{is:false};
}
function cmpArr(a,b){
  for(let i=0;i<Math.min(a.length,b.length);i++) if(a[i]!==b[i]) return a[i]-b[i];
  return 0;
}
function compareHands(a,b){
  if(a.rank!==b.rank)return a.rank-b.rank;return cmpArr(a.tb,b.tb);
}
